<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>foxi-tools</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f8f8f5;
    color: #444;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 24px 40px 20px;
    border-bottom: 1px solid #d0d0cc;
  }
  header h1 {
    font-size: 13px;
    font-weight: normal;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
  }
  header p {
    margin-top: 6px;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.04em;
  }
  main {
    padding: 32px 40px;
    flex: 1;
  }
  .tools {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 520px;
  }
  .tool-link {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid #e8e8e4;
    text-decoration: none;
    color: inherit;
  }
  .tool-link:last-child { border-bottom: none; }
  .tool-link:hover .tool-name { color: #222; }
  .tool-name {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #444;
    text-transform: uppercase;
    transition: color 0.1s;
    flex-shrink: 0;
  }
  .tool-desc {
    font-size: 11px;
    color: #999;
    letter-spacing: 0.02em;
  }
  footer {
    padding: 14px 40px;
    border-top: 1px solid #d0d0cc;
    font-size: 10px;
    color: #aaa;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <h1>foxi-tools</h1>
  <p>佛系 — buddha-like. go with the flow.</p>
</header>

<main>
  <div class="tools">
    <a class="tool-link" href="life-in-months/">
      <span class="tool-name">Life in Months</span>
      <span class="tool-desc">visualize your life as a grid of months</span>
    </a>
  </div>
</main>

<footer>***REMOVED***</footer>

</body>
</html>
