<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table — foxi-tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: clamp(17px, 1.3vw, 26px); }

:root {
  --bg:           #f8f8f5;
  --bg-panel:     #edeae3;
  --text:         #222;
  --text-2:       #666;
  --text-3:       #888;
  --border:       #d0d0cc;
  --accent:       #4a7ab4;

  --cat-alkali-metal:    #f4a26b;
  --cat-alkaline-earth:  #f6c27a;
  --cat-transition-metal:#b8d4e8;
  --cat-post-transition: #c3e0c3;
  --cat-metalloid:       #d4c5e8;
  --cat-nonmetal:        #e8e4a0;
  --cat-noble-gas:       #a8d8ea;
  --cat-lanthanide:      #f0c8c8;
  --cat-actinide:        #e8b8b8;

  --theme-human:   #e8a84c;
  --theme-rocket: #5b8db8;
  --theme-food: #7aad7a;
  --theme-fire:#e05c3a;
  --theme-air:    #9ecce0;
  --theme-water:  #3478a0;
  --theme-earth:  #9e7840;
  --theme-weapon: #b83030;
  --theme-plant: #3a8a3a;
  --theme-animal: #8858a8;
  --theme-moon:   #788898;
  --theme-mars:   #b84028;
  --theme-sun:    #c89010;
  --theme-fuel:   #486038;

  --cell-size: 48px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 0.82rem;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 14px 24px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.header-title-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
header h1 {
  font-size: 0.88rem;
  font-weight: normal;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
header p {
  font-size: 0.7rem;
  color: var(--text-3);
  letter-spacing: 0.04em;
}
.back-link {
  font-size: 0.72rem;
  color: var(--text-3);
  text-decoration: none;
  letter-spacing: 0.06em;
}
.back-link:hover { color: var(--text); }

/* ── Sidebar (spotlight) ── */
#sidebar {
  width: 150px;
  min-width: 150px;
  border-right: 1px solid var(--border);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-label {
  font-size: 0.62rem;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.theme-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.theme-group + .theme-group {
  margin-top: 6px;
}
.theme-group-label {
  font-size: 0.55rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 2px;
  text-align: center;
}
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: inherit;
  font-size: 0.72rem;
  padding: 7px 10px;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-align: left;
  width: 100%;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.theme-btn:hover { border-color: var(--text-2); color: var(--text); }
.theme-btn.active {
  color: #fff;
  border-color: transparent;
}
.theme-btn[data-key="human"].active    { background: var(--theme-human); }
.theme-btn[data-key="rocket"].active  { background: var(--theme-rocket); }
.theme-btn[data-key="food"].active  { background: var(--theme-food); }
.theme-btn[data-key="fire"].active { background: var(--theme-fire); }
.theme-btn[data-key="air"].active     { background: var(--theme-air); }
.theme-btn[data-key="water"].active   { background: var(--theme-water); color: var(--bg); }
.theme-btn[data-key="earth"].active   { background: var(--theme-earth); color: var(--bg); }
.theme-btn[data-key="weapon"].active  { background: var(--theme-weapon); color: var(--bg); }
.theme-btn[data-key="plant"].active  { background: var(--theme-plant); color: var(--bg); }
.theme-btn[data-key="animal"].active  { background: var(--theme-animal); color: var(--bg); }
.theme-btn[data-key="moon"].active    { background: var(--theme-moon);   color: var(--bg); }
.theme-btn[data-key="mars"].active    { background: var(--theme-mars);   color: var(--bg); }
.theme-btn[data-key="sun"].active     { background: var(--theme-sun);    color: var(--bg); }
.theme-btn[data-key="fuel"].active    { background: var(--theme-fuel);   color: var(--bg); }

#clear-btn {
  background: none;
  border: none;
  color: var(--text-3);
  font-family: inherit;
  font-size: 0.65rem;
  padding: 4px 0;
  cursor: pointer;
  letter-spacing: 0.06em;
  text-align: center;
  width: 100%;
  margin-top: 4px;
}
#clear-btn:hover { color: var(--text); }

/* ── Main layout ── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── Grid wrapper ── */
#grid-wrapper {
  flex: 1;
  overflow: auto;
  padding: 16px 16px 16px 24px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(18, var(--cell-size));
  grid-template-rows: repeat(10, var(--cell-size));
  gap: 2px;
  width: fit-content;
  min-width: calc(18 * (var(--cell-size) + 2px));
}

/* ── Period/group gap label row for lanthanides/actinides ── */
#grid-wrapper .f-block-gap {
  grid-row: 8;
  grid-column: 3 / 4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.52rem;
  color: var(--text-3);
  letter-spacing: 0.04em;
}

/* ── Element cells ── */
.cell {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 1px solid transparent;
  transition: opacity 0.15s, background-color 0.15s;
  user-select: none;
  overflow: hidden;
}
.cell:hover { border-color: var(--text); z-index: 1; }
.cell.selected { border-color: var(--text); border-width: 2px; }

.cell .num {
  font-size: 0.52rem;
  color: var(--text-2);
  line-height: 1;
  align-self: flex-start;
  padding: 3px 3px 0;
}
.cell .sym {
  font-size: 1.05rem;
  font-weight: bold;
  line-height: 1.1;
  color: var(--text);
}
.cell .name-short {
  font-size: 0.42rem;
  color: var(--text-2);
  line-height: 1;
  letter-spacing: 0.02em;
  text-align: center;
  padding: 0 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
  text-align: center;
}

.cell .theme-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  background: var(--text);
  color: var(--bg);
  font-size: 0.5rem;
  padding: 1px 2px;
  line-height: 1;
  display: none;
}

.cell.dimmed {
  opacity: 0.22;
}

/* Category base colors */
.cat-alkali-metal    { background: var(--cat-alkali-metal); }
.cat-alkaline-earth  { background: var(--cat-alkaline-earth); }
.cat-transition-metal{ background: var(--cat-transition-metal); }
.cat-post-transition { background: var(--cat-post-transition); }
.cat-metalloid       { background: var(--cat-metalloid); }
.cat-nonmetal        { background: var(--cat-nonmetal); }
.cat-noble-gas       { background: var(--cat-noble-gas); }
.cat-lanthanide      { background: var(--cat-lanthanide); }
.cat-actinide        { background: var(--cat-actinide); }

/* ── Detail panel (overlays grid, not in flex flow) ── */
#panel {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 280px;
  border-left: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 0;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 200ms ease;
  overflow-y: auto;
  z-index: 10;
}
#panel.open {
  transform: translateX(0);
}

#panel-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.panel-symbol {
  font-size: 3.2rem;
  font-weight: bold;
  line-height: 1;
  color: var(--text);
}
.panel-name {
  font-size: 0.95rem;
  color: var(--text);
  margin-top: 4px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.panel-meta {
  font-size: 0.68rem;
  color: var(--text-2);
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.panel-meta span {
  display: inline-flex;
  flex-direction: row;
  align-items: baseline;
  gap: 4px;
}
.panel-meta .meta-label {
  font-size: 0.68rem;
  color: var(--text-2);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.panel-cat-tag {
  font-size: 0.62rem;
  padding: 2px 6px;
  color: var(--text);
  letter-spacing: 0.04em;
  margin-top: 8px;
  display: inline-block;
}
#panel-isotopes {
  font-size: 0.68rem;
  color: var(--text-2);
  margin-top: 6px;
  letter-spacing: 0.02em;
  position: relative;
  cursor: default;
  display: block;
}
#panel-isotopes[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: var(--text);
  color: var(--bg);
  font-size: 0.65rem;
  line-height: 1.45;
  padding: 6px 10px;
  white-space: normal;
  width: 220px;
  pointer-events: none;
  z-index: 200;
  letter-spacing: 0.02em;
}

#panel-body {
  padding: 16px 20px;
  flex: 1;
}
.fact-block {
  margin-bottom: 14px;
}
.fact-theme-label {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fact-theme-dot {
  width: 8px;
  height: 8px;
  display: inline-block;
  flex-shrink: 0;
}
.fact-text {
  font-size: 0.75rem;
  color: var(--text);
  line-height: 1.55;
}

#panel-close {
  position: sticky;
  bottom: 0;
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 10px 20px;
}
#panel-close button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-3);
  font-family: inherit;
  font-size: 0.7rem;
  padding: 4px 10px;
  cursor: pointer;
  letter-spacing: 0.06em;
  width: 100%;
}
#panel-close button:hover { border-color: var(--text-2); color: var(--text); }

/* ── Legend ── */
#legend {
  padding: 8px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  flex-shrink: 0;
  justify-content: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.62rem;
  color: var(--text-3);
  letter-spacing: 0.04em;
  position: relative;
  cursor: default;
}
.legend-item:hover { color: var(--text-2); }
.legend-item[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  font-size: 0.65rem;
  line-height: 1.45;
  padding: 6px 10px;
  white-space: normal;
  width: 190px;
  text-align: left;
  pointer-events: none;
  z-index: 200;
  letter-spacing: 0.02em;
}
/* First two items: open tooltip rightward to avoid left-edge clip */
.legend-item:nth-child(1)[data-tooltip]:hover::after,
.legend-item:nth-child(2)[data-tooltip]:hover::after {
  left: 0;
  transform: none;
}
/* Last two items: open tooltip leftward to avoid right-edge clip */
.legend-item:nth-last-child(1)[data-tooltip]:hover::after,
.legend-item:nth-last-child(2)[data-tooltip]:hover::after {
  left: auto;
  right: 0;
  transform: none;
}
.legend-swatch {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}

/* ── Footer ── */
footer {
  padding: 10px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.version { font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.06em; }

/* ── Mobile ── */
@media (max-width: 768px) {
  :root { --cell-size: 36px; }

  #main {
    flex-direction: column;
    overflow: visible;
  }

  #sidebar {
    width: 100%;
    min-width: unset;
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-direction: row;
    flex-wrap: wrap;
    padding: 10px 12px;
    gap: 6px;
  }
  .sidebar-label { display: none; }
  .theme-group + .theme-group { margin-top: 0; }
  #clear-btn { margin-top: 0; }
  .theme-btn { width: auto; padding: 5px 10px; }

  #grid-wrapper {
    overflow-x: auto;
    overflow-y: visible;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
  }

  #panel {
    position: fixed;
    right: auto;
    top: auto;
    left: 0;
    bottom: 0;
    width: 100%;
    max-height: 50vh;
    min-height: 200px;
    border-left: none;
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 200ms ease;
  }
  #panel.open {
    transform: translateY(0);
  }

  #legend { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-title-group">
    <h1>Periodic Table</h1>
    <p>Explore all 118 elements in a fun way</p>
  </div>
</header>

<div id="main">
  <nav id="sidebar" role="toolbar" aria-label="Theme filters">
    <div class="theme-group">
      <span class="theme-group-label">Elements</span>
      <button class="theme-btn" data-key="air"     aria-pressed="false">Air</button>
      <button class="theme-btn" data-key="earth"   aria-pressed="false">Earth</button>
      <button class="theme-btn" data-key="fire" aria-pressed="false">Fire</button>
      <button class="theme-btn" data-key="water"   aria-pressed="false">Water</button>
    </div>
    <div class="theme-group">
      <span class="theme-group-label">Life</span>
      <button class="theme-btn" data-key="animal"  aria-pressed="false">Animal</button>
      <button class="theme-btn" data-key="human"    aria-pressed="false">Human</button>
      <button class="theme-btn" data-key="food"  aria-pressed="false">Food</button>
      <button class="theme-btn" data-key="plant"  aria-pressed="false">Plant</button>
    </div>
    <div class="theme-group">
      <span class="theme-group-label">Technology</span>
      <button class="theme-btn" data-key="fuel"    aria-pressed="false">Fuel</button>
      <button class="theme-btn" data-key="rocket"  aria-pressed="false">Rocket</button>
      <button class="theme-btn" data-key="weapon"  aria-pressed="false">Weapon</button>
    </div>
    <div class="theme-group">
      <span class="theme-group-label">Universe</span>
      <button class="theme-btn" data-key="mars"    aria-pressed="false">Mars</button>
      <button class="theme-btn" data-key="moon"    aria-pressed="false">Moon</button>
      <button class="theme-btn" data-key="sun"     aria-pressed="false">Sun</button>
    </div>
    <button id="clear-btn">Reset</button>
  </nav>
  <div id="grid-wrapper">
    <div id="grid" role="grid" aria-label="Periodic table of elements"></div>
  </div>
  <div id="panel" role="complementary" aria-live="polite" aria-label="Element detail">
    <div id="panel-header">
      <div class="panel-symbol" id="panel-symbol"></div>
      <div class="panel-name" id="panel-name"></div>
      <div class="panel-meta">
        <span><span class="meta-label">Atomic Number:</span><span id="panel-number"></span></span>
      </div>
      <div id="panel-isotopes"></div>
      <span class="panel-cat-tag" id="panel-cat"></span>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<div id="legend">
  <div class="legend-item" data-tooltip="Soft, reactive metals that explode or fizz in water. Lithium (batteries), sodium (table salt), potassium (bananas)."><div class="legend-swatch" style="background:var(--cat-alkali-metal)"></div>alkali metal</div>
  <div class="legend-item" data-tooltip="Harder reactive metals. Calcium (bones &amp; teeth), magnesium (bright white fireworks), beryllium (telescope mirrors)."><div class="legend-swatch" style="background:var(--cat-alkaline-earth)"></div>alkaline earth</div>
  <div class="legend-item" data-tooltip="The big middle block. Most metals you encounter every day: iron, copper, gold, silver, nickel, zinc."><div class="legend-swatch" style="background:var(--cat-transition-metal)"></div>transition metal</div>
  <div class="legend-item" data-tooltip="Softer metals that melt at lower temperatures. Aluminum (foil &amp; cans), tin (food cans), lead (old pipes)."><div class="legend-swatch" style="background:var(--cat-post-transition)"></div>post-transition</div>
  <div class="legend-item" data-tooltip="Part metal, part non-metal. Silicon (every computer chip ever made), arsenic (historic poison)."><div class="legend-swatch" style="background:var(--cat-metalloid)"></div>metalloid</div>
  <div class="legend-item" data-tooltip="Life's building blocks — mostly gases. Oxygen (breathing), carbon (all living things), hydrogen (water), nitrogen (air)."><div class="legend-swatch" style="background:var(--cat-nonmetal)"></div>nonmetal</div>
  <div class="legend-item" data-tooltip="Gases that almost never react with anything. Helium (balloons), neon (signs), argon (inside light bulbs)."><div class="legend-swatch" style="background:var(--cat-noble-gas)"></div>noble gas</div>
  <div class="legend-item" data-tooltip="Rare earth metals used in phone screens, EV motors, and lasers. Most of the world's supply is mined in China."><div class="legend-swatch" style="background:var(--cat-lanthanide)"></div>lanthanide</div>
  <div class="legend-item" data-tooltip="Heavy radioactive elements. Uranium and plutonium live here — nuclear power and weapons are built from this row."><div class="legend-swatch" style="background:var(--cat-actinide)"></div>actinide</div>
</div>

<footer>
  <a class="back-link" href="../">< Home</a>
  <span class="version" style="margin-left: auto">v1.0.0</span>
</footer>

<script>
// ─────────────────────────────────────────────
// THEMES
// ─────────────────────────────────────────────
const THEMES = [
  // Elements
  { key: 'air',     label: 'Air',        color: 'var(--theme-air)'     },
  { key: 'earth',   label: 'Earth',      color: 'var(--theme-earth)'   },
  { key: 'fire', label: 'Fire',       color: 'var(--theme-fire)' },
  { key: 'water',   label: 'Water',      color: 'var(--theme-water)'   },
  // Life
  { key: 'animal',  label: 'Animal', color: 'var(--theme-animal)'  },
  { key: 'human',    label: 'Human',  color: 'var(--theme-human)'    },
  { key: 'food',  label: 'Food',   color: 'var(--theme-food)'  },
  { key: 'plant',  label: 'Plant',  color: 'var(--theme-plant)'  },
  // Technology
  { key: 'fuel',    label: 'Fuel',      color: 'var(--theme-fuel)'    },
  { key: 'rocket',  label: 'Rocket',    color: 'var(--theme-rocket)'  },
  { key: 'weapon',  label: 'Weapon',    color: 'var(--theme-weapon)'  },
  // Universe
  { key: 'mars',    label: 'Mars',      color: 'var(--theme-mars)'    },
  { key: 'moon',    label: 'Moon',      color: 'var(--theme-moon)'    },
  { key: 'sun',     label: 'Sun',       color: 'var(--theme-sun)'     },
];

// ─────────────────────────────────────────────
// ELEMENTS
// All 118 elements.
// period = chemical period (1–7), group = chemical group (1–18).
// Renderer uses grid-row: period, grid-column: group for normal elements.
// La (57) and Ac (89) stay in the main grid at group 3; they do NOT have fBlock: true.
// fBlock: true → Ce–Lu (58–71) and Th–Lr (90–103) only.
//   displayRow: lanthanides → 9, actinides → 10
//   displayCol: (number - 58 + 4) lanthanides, (number - 90 + 4) actinides
// Theme membership = key presence. Missing key = non-member.
// ─────────────────────────────────────────────
const ELEMENTS = [
  // ── Period 1 ──────────────────────────────
  {
    symbol: 'H', name: 'Hydrogen', number: 1, mass: 1.008,
    category: 'nonmetal', period: 1, group: 1,
    defaultFact: 'The simplest atom in the universe — one proton, one electron. Three-quarters of all visible matter is hydrogen.',
    themes: {
      human:    { fact: 'Water is two hydrogen atoms bonded to one oxygen. You are roughly 60% water, making hydrogen the most abundant element in your body by number of atoms.' },
      rocket:  { fact: 'SpaceX\'s Raptor engines burn liquid methane (CH₄), while the upper atmosphere exit nozzles on some missions use liquid hydrogen. It produces only water when burned.' },
      food:  { fact: 'Every food you eat is packed with hydrogen — water, sugars, fats, and proteins all contain it. It\'s in every sip and every bite.' },
      fire: { fact: 'Hydrogen burns with an invisible flame hot enough to melt steel. The Hindenburg disaster (1937) killed 36 people when 200,000 m³ of hydrogen ignited in 34 seconds.' },
      air:     { fact: 'In the upper atmosphere, hydrogen floats freely — the lightest gas rises above everything. The exosphere is mostly hydrogen. Water vapor (H₂O) in clouds is hydrogen bonded to oxygen.' },
      water:   { fact: 'Hydrogen IS water — two hydrogen atoms per molecule. Every ocean, river, raindrop, and ice cube is mostly hydrogen by atom count. Without hydrogen, water doesn\'t exist.' },
      plant:  { fact: 'Plant split water molecules (H₂O) during photosynthesis, releasing oxygen and keeping the hydrogen to build sugars. Every leaf, root, and fruit is built partly from hydrogen atoms originally in water.' },

      sun:   { fact: 'The Sun is 74% hydrogen by mass — 1.5 × 10²⁷ kg of it. Every second, 600 million tonnes of hydrogen fuse into helium in the core, releasing energy that reaches Earth as sunlight 8 minutes later. This has been running for 4.6 billion years and has enough fuel for 5 billion more.' },
    
      fuel:   { fact: 'Hydrogen is the cleanest fuel: burn it and get only water. Green hydrogen is made by electrolyzing water with renewable electricity; blue hydrogen strips it from natural gas while capturing the CO₂. Hydrogen fuel cells power Toyota\'s Mirai and prototype cargo ships. SpaceX\'s Starship could burn liquid hydrogen if Elon hadn\'t switched to methane.' },
      animal: { fact: 'Every animal is mostly hydrogen — locked in water molecules and organic compounds. A dolphin, a whale, an insect, and a hummingbird are all roughly 60–70% water by mass. Marine mammals diving to 2,000 m carry their hydrogen-rich oxygen supply in richly oxygenated blood and muscle tissue (myoglobin). Life as we know it is a hydrogen story.' },

  {

      weapon:  { fact: 'Carbon is the backbone of gunpowder (charcoal + sulfur + potassium nitrate), TNT, and RDX. Carbon fiber armor protects soldiers. Every explosive and most propellants are carbon chemistry — carbon\'s ability to store and release energy rapidly is what makes them work.' },

      mars:   { fact: 'Mars\'s atmosphere is 95% carbon dioxide — a thick blanket of CO₂ that keeps the planet frozen. NASA\'s MOXIE experiment on the Perseverance rover split Martian CO₂ into oxygen and carbon monoxide in 2021, proving future missions can manufacture rocket propellant from thin Martian air.' },
    
      sun:   { fact: 'Massive stars — those more than 1.3× the Sun\'s mass — are powered by the CNO cycle, where carbon, nitrogen, and oxygen act as catalysts to fuse hydrogen into helium. Carbon is not consumed, just rearranged in a loop. In these hot stellar cores, carbon-12 acts as a nuclear assembly line for helium production.' },

  {

      air:    { fact: 'Nitrogen is air. It makes up 78% of every breath you take — yet your body can\'t use it directly. It just passes in and out, doing nothing. Only certain bacteria can "fix" atmospheric nitrogen into forms plants and animals can actually use.' },

      sun:   { fact: 'Nitrogen is a catalyst in the CNO cycle — the dominant fusion process in stars hotter and heavier than our Sun. A nitrogen nucleus captures a proton, decays, and eventually regenerates itself while helium-4 is ejected as the net product. Stars burn nitrogen the way an engine burns fuel — without consuming it.' },
    
      fuel:   { fact: 'Nitrogen oxides (NOₓ) are an unavoidable byproduct of burning fuels at high temperatures — the nitrogen and oxygen in air react together. Diesel engines and jet engines produce substantial NOₓ, which causes smog and acid rain. Catalytic converters use platinum and rhodium to convert NOₓ back into harmless N₂ and O₂.' },
      animal: { fact: 'Every animal muscle, fur, feather, scale, and claw is built from nitrogen-containing proteins. Keratin — the material of bird feathers, reptile scales, rhino horns, and mammal hair — is held together by nitrogen-based amino acid chains. Animals can\'t fix nitrogen from air; they depend entirely on eating it, either from plants or from other animals.' },

  {
    symbol: 'O', name: 'Oxygen', number: 8, mass: 15.999,

      moon:   { fact: 'Oxygen makes up ~45% of lunar regolith by mass, locked in silicate minerals. NASA\'s ISRU (in-situ resource utilization) experiments can extract it by melting and electrolyzing lunar rock. Future Moon bases won\'t ship oxygen from Earth — they\'ll mine it from the ground they walk on.' },
      mars:   { fact: 'NASA\'s MOXIE experiment on Perseverance rover produced breathable oxygen from Martian CO₂ in 2021 — the first resource ever manufactured on another planet. Scaled up, MOXIE-type reactors could produce the liquid oxygen needed for rockets to return to Earth, eliminating the need to carry return propellant from home.' },
    
      sun:   { fact: 'Oxygen is forged inside massive stars by fusing helium nuclei together (the triple-alpha process makes carbon; one more helium capture makes oxygen). When those stars explode as supernovae, they scatter oxygen across the galaxy. Every oxygen atom in your body — and in every breath of air — was made in a star that died before our Sun was born.' },
    
      fuel:   { fact: 'Combustion is fundamentally an oxygen reaction — every fuel, from wood to jet fuel to hydrogen, needs oxygen to burn. Liquid oxygen (LOX) is the oxidizer in rocket engines. Internal combustion engines breathe air; jet engines compress it. Without oxygen, all fire goes out. The entire energy system humans have built runs on oxidizing things.' },
      animal: { fact: 'All animals need oxygen to release energy from food. Fish extract it from water through gills; insects breathe through spiracles along their body; birds have a one-way airflow lung far more efficient than mammalian lungs. Diving animals like sperm whales store oxygen in muscle myoglobin — their muscles turn almost black with it, letting them hold breath for over 90 minutes.' },

  {

      earth:   { fact: 'Sodium is the sixth most abundant element in Earth\'s crust. Feldspars and other silicate minerals are full of sodium. When rock weathers and erodes, sodium washes into rivers and eventually the ocean — it\'s why the sea is salty.' },

      animal: { fact: 'Sodium is the engine of all animal nerve signaling. A squid fires nerve impulses at 25 m/s using sodium; a myelinated mammal nerve reaches 120 m/s — all through the same sodium-potassium pump mechanism. Electric eels generate 600-volt pulses by stacking thousands of specialized sodium-channel cells in sequence. Every animal that moves, senses, or thinks runs on sodium gradients.' },

  {

      animal: { fact: 'Magnesium is involved in over 300 enzyme reactions in every animal — from insects to blue whales. It\'s the cofactor for ATP: every time an animal uses energy, a magnesium ion is right there stabilising the ATP molecule. Migratory birds have been found to deplete magnesium reserves during long non-stop flights. Sea turtles accumulate magnesium from seagrass; deficiency weakens their immune response and shell integrity.' },

// ─────────────────────────────────────────────
// GRID POSITION HELPERS
// ─────────────────────────────────────────────
function getDisplayRow(el) {
  if (!el.fBlock) return el.period;
  return el.number >= 90 ? 10 : 9;
}

function getDisplayCol(el) {
  if (!el.fBlock) return el.group;
  if (el.number >= 90) return el.number - 90 + 4;
  return el.number - 58 + 4;
}

// ─────────────────────────────────────────────
// BUILD GRID
// ─────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Validation: assert no two elements share the same (displayRow, displayCol)
  const seen = new Map();
  for (const el of ELEMENTS) {
    const key = `${getDisplayRow(el)},${getDisplayCol(el)}`;
    if (seen.has(key)) {
      console.error(`Grid conflict: ${el.symbol} and ${seen.get(key)} both at (${key})`);
    }
    seen.set(key, el.symbol);
  }

  for (const el of ELEMENTS) {
    const row = getDisplayRow(el);
    const col = getDisplayCol(el);
    const cell = document.createElement('div');
    cell.className = `cell cat-${el.category}`;
    cell.style.gridRow = row;
    cell.style.gridColumn = col;
    cell.dataset.number = el.number;
    cell.setAttribute('role', 'gridcell');
    cell.setAttribute('aria-label', `${el.name}, atomic number ${el.number}`);
    cell.setAttribute('tabindex', '0');

    cell.innerHTML = `
      <span class="num">${el.number}</span>
      <span class="sym">${el.symbol}</span>
      <span class="name-short">${el.name}</span>
      <span class="theme-badge"></span>
    `;

    cell.addEventListener('click', () => openPanel(el, cell));
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPanel(el, cell); }
    });

    grid.appendChild(cell);
  }

  // Gap label row (visual connector between main grid and f-block rows)
  const gapSpan = document.createElement('div');
  gapSpan.style.gridRow = '8';
  gapSpan.style.gridColumn = '1 / 19';
  gapSpan.style.height = '6px';
  grid.appendChild(gapSpan);

  applyThemeHighlights();
}

// ─────────────────────────────────────────────
// THEME HIGHLIGHT RENDER
// ─────────────────────────────────────────────
function applyThemeHighlights() {
  const cells = document.querySelectorAll('.cell');
  const anyActive = activeThemes.size > 0;

  cells.forEach(cell => {
    const num = parseInt(cell.dataset.number, 10);
    const el = ELEMENTS[num - 1];
    const badge = cell.querySelector('.theme-badge');

    // Iterate THEMES array (not activeThemes Set) to preserve leftmost-button tie-break
    const matchingThemes = THEMES.filter(t => activeThemes.has(t.key) && t.key in el.themes);

    if (!anyActive) {
      cell.classList.remove('dimmed');
      cell.style.backgroundColor = '';
      badge.style.display = 'none';
    } else if (matchingThemes.length === 0) {
      cell.classList.add('dimmed');
      cell.style.backgroundColor = '';
      badge.style.display = 'none';
    } else {
      cell.classList.remove('dimmed');
      // Use CSS variable resolved value for leftmost matching theme
      cell.style.backgroundColor = `var(--theme-${matchingThemes[0].key})`;
      if (matchingThemes.length >= 2) {
        badge.textContent = matchingThemes.length;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    }

    // Keep selected cell border
    if (selectedElement && selectedElement.number === num) {
      cell.classList.add('selected');
    } else {
      cell.classList.remove('selected');
    }
  });
}

// ─────────────────────────────────────────────
// DETAIL PANEL
// ─────────────────────────────────────────────
const CAT_LABELS = {
  'alkali-metal':     'Alkali Metal',
  'alkaline-earth':   'Alkaline Earth',
  'transition-metal': 'Transition Metal',
  'post-transition':  'Post-Transition Metal',
  'metalloid':        'Metalloid',
  'nonmetal':         'Nonmetal',
  'noble-gas':        'Noble Gas',
  'lanthanide':       'Lanthanide',
  'actinide':         'Actinide',
};

function openPanel(el, cellEl) {
  selectedElement = el;
  applyThemeHighlights();

  document.getElementById('panel-symbol').textContent = el.symbol;
  document.getElementById('panel-name').textContent = el.name;
  document.getElementById('panel-number').textContent = el.number;
  const catEl = document.getElementById('panel-cat');
  catEl.textContent = CAT_LABELS[el.category] || el.category;
  catEl.className = `panel-cat-tag cat-${el.category}`;

  const iso = ISOTOPES[el.number];
  const isoEl = document.getElementById('panel-isotopes');
  const isoTooltip = 'Isotopes are variants of the same element with different numbers of neutrons in the nucleus — same element, different atomic mass.';
  if (iso) {
    isoEl.setAttribute('data-tooltip', isoTooltip);
    if (iso.stable.length > 0) {
      const list = iso.stable.map(m => `${el.symbol}-${m}`).join(' ');
      isoEl.textContent = `ISOTOPES: ${list}`;
    } else if (iso.notable && iso.notable.length > 0) {
      const list = iso.notable.map(m => `${el.symbol}-${m}`).join(' ');
      isoEl.textContent = `ISOTOPES: ${list}`;
    } else {
      isoEl.textContent = '';
    }
  } else {
    isoEl.removeAttribute('data-tooltip');
    isoEl.textContent = '';
  }

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  // Matching active themes for this element
  const matchingThemes = THEMES.filter(t => activeThemes.has(t.key) && t.key in el.themes);

  if (matchingThemes.length === 0) {
    // No theme active, or element not in any active theme → show defaultFact
    const block = document.createElement('div');
    block.className = 'fact-block';
    block.innerHTML = `<p class="fact-text">${el.defaultFact}</p>`;
    body.appendChild(block);
  } else {
    // Show theme-specific facts for matching themes
    for (const theme of matchingThemes) {
      const block = document.createElement('div');
      block.className = 'fact-block';
      block.innerHTML = `
        <div class="fact-theme-label">
          <span class="fact-theme-dot" style="background:var(--theme-${theme.key})"></span>
          ${theme.label}
        </div>
        <p class="fact-text">${el.themes[theme.key].fact}</p>
      `;
      body.appendChild(block);
    }
  }

  // Isotope note (always shown at bottom when present)
  if (iso && iso.note) {
    const isoBlock = document.createElement('div');
    isoBlock.className = 'fact-block';
    isoBlock.innerHTML = `
      <div class="fact-theme-label">Isotopes</div>
      <p class="fact-text">${iso.note}</p>
    `;
    body.appendChild(isoBlock);
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selectedElement = null;
  applyThemeHighlights();
}

// ─────────────────────────────────────────────
// THEME TOGGLE
// ─────────────────────────────────────────────
function toggleTheme(key) {
  if (activeThemes.has(key)) {
    activeThemes.delete(key);
  } else {
    activeThemes.add(key);
  }

  // Update button states
  document.querySelectorAll('.theme-btn').forEach(btn => {
    const active = activeThemes.has(btn.dataset.key);
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });

  // Re-render panel facts if open
  if (selectedElement) {
    openPanel(selectedElement, null);
  }

  applyThemeHighlights();
}

function clearAll() {
  activeThemes.clear();
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.remove('active');
    btn.setAttribute('aria-pressed', 'false');
  });
  applyThemeHighlights();
  if (selectedElement) {
    openPanel(selectedElement, null);
  }
}

// ─────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => toggleTheme(btn.dataset.key));
});
document.getElementById('clear-btn').addEventListener('click', clearAll);
// Close panel when clicking anywhere except the panel itself or an element cell
document.addEventListener('click', (e) => {
  if (!selectedElement) return;
  const panel = document.getElementById('panel');
  if (!panel.contains(e.target) && !e.target.closest('.cell')) {
    closePanel();
  }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildGrid();
</script>
