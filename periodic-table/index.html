<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table Explorer — foxi-tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f8f8f5;
  --bg-panel:     #edeae3;
  --text:         #222;
  --text-2:       #666;
  --text-3:       #888;
  --border:       #d0d0cc;
  --accent:       #4a7ab4;

  --cat-alkali-metal:    #f4a26b;
  --cat-alkaline-earth:  #f6c27a;
  --cat-transition-metal:#b8d4e8;
  --cat-post-transition: #c3e0c3;
  --cat-metalloid:       #d4c5e8;
  --cat-nonmetal:        #e8e4a0;
  --cat-noble-gas:       #a8d8ea;
  --cat-lanthanide:      #f0c8c8;
  --cat-actinide:        #e8b8b8;

  --theme-body:   #e8a84c;
  --theme-spacex: #5b8db8;
  --theme-edible: #7aad7a;
  --theme-burning:#e05c3a;

  --cell-size: 48px;
}

.dark {
  --bg:           #1a1a18;
  --bg-panel:     #252520;
  --text:         #f0f0ed;
  --text-2:       #aaa;
  --text-3:       #777;
  --border:       #3a3a36;
  --accent:       #6a9ad4;

  --cat-alkali-metal:    #7a4422;
  --cat-alkaline-earth:  #7a5420;
  --cat-transition-metal:#22445a;
  --cat-post-transition: #225a22;
  --cat-metalloid:       #3a2a6a;
  --cat-nonmetal:        #4a4a20;
  --cat-noble-gas:       #1a4a5a;
  --cat-lanthanide:      #6a2828;
  --cat-actinide:        #5a2020;

  --theme-body:   #d4902a;
  --theme-spacex: #4a7aa8;
  --theme-edible: #5a9a5a;
  --theme-burning:#c84828;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 0.82rem;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 14px 24px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
header h1 {
  font-size: 0.88rem;
  font-weight: normal;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  flex: 1;
}
.back-link {
  font-size: 0.72rem;
  color: var(--text-3);
  text-decoration: none;
  letter-spacing: 0.06em;
}
.back-link:hover { color: var(--text); }
.dark-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: inherit;
  font-size: 0.72rem;
  padding: 3px 8px;
  cursor: pointer;
  letter-spacing: 0.06em;
}
.dark-toggle:hover { border-color: var(--text-2); color: var(--text); }

/* ── Theme controls ── */
#controls {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: inherit;
  font-size: 0.75rem;
  padding: 5px 12px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  position: relative;
}
.theme-btn:hover { border-color: var(--text-2); color: var(--text); }
.theme-btn.active {
  color: #fff;
  border-color: transparent;
}
.theme-btn[data-key="body"].active    { background: var(--theme-body); }
.theme-btn[data-key="spacex"].active  { background: var(--theme-spacex); }
.theme-btn[data-key="edible"].active  { background: var(--theme-edible); }
.theme-btn[data-key="burning"].active { background: var(--theme-burning); }

#clear-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-3);
  font-family: inherit;
  font-size: 0.72rem;
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 0.05em;
  margin-left: 4px;
}
#clear-btn:hover { border-color: var(--text-2); color: var(--text); }

.controls-label {
  font-size: 0.68rem;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-right: 4px;
}

/* ── Main layout ── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Grid wrapper ── */
#grid-wrapper {
  flex: 1;
  overflow: auto;
  padding: 16px 16px 16px 24px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(18, var(--cell-size));
  grid-template-rows: repeat(10, var(--cell-size));
  gap: 2px;
  width: fit-content;
  min-width: calc(18 * (var(--cell-size) + 2px));
}

/* ── Period/group gap label row for lanthanides/actinides ── */
#grid-wrapper .f-block-gap {
  grid-row: 8;
  grid-column: 3 / 4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.52rem;
  color: var(--text-3);
  letter-spacing: 0.04em;
}

/* ── Element cells ── */
.cell {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 1px solid transparent;
  transition: opacity 0.15s, background-color 0.15s;
  user-select: none;
  overflow: hidden;
}
.cell:hover { border-color: var(--text); z-index: 1; }
.cell.selected { border-color: var(--text); border-width: 2px; }

.cell .num {
  font-size: 0.52rem;
  color: var(--text-2);
  line-height: 1;
  align-self: flex-start;
  padding: 3px 3px 0;
}
.cell .sym {
  font-size: 1.05rem;
  font-weight: bold;
  line-height: 1.1;
  color: var(--text);
}
.cell .name-short {
  font-size: 0.42rem;
  color: var(--text-2);
  line-height: 1;
  letter-spacing: 0.02em;
  text-align: center;
  padding: 0 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
  text-align: center;
}

.cell .theme-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  background: var(--text);
  color: var(--bg);
  font-size: 0.5rem;
  padding: 1px 2px;
  line-height: 1;
  display: none;
}

.cell.dimmed {
  opacity: 0.22;
}

/* Category base colors */
.cat-alkali-metal    { background: var(--cat-alkali-metal); }
.cat-alkaline-earth  { background: var(--cat-alkaline-earth); }
.cat-transition-metal{ background: var(--cat-transition-metal); }
.cat-post-transition { background: var(--cat-post-transition); }
.cat-metalloid       { background: var(--cat-metalloid); }
.cat-nonmetal        { background: var(--cat-nonmetal); }
.cat-noble-gas       { background: var(--cat-noble-gas); }
.cat-lanthanide      { background: var(--cat-lanthanide); }
.cat-actinide        { background: var(--cat-actinide); }

/* ── Detail panel ── */
#panel {
  width: 280px;
  min-width: 280px;
  border-left: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 0;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 200ms ease;
  overflow-y: auto;
  flex-shrink: 0;
}
#panel.open {
  transform: translateX(0);
}

#panel-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.panel-symbol {
  font-size: 3.2rem;
  font-weight: bold;
  line-height: 1;
  color: var(--text);
}
.panel-name {
  font-size: 0.95rem;
  color: var(--text);
  margin-top: 4px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.panel-meta {
  font-size: 0.7rem;
  color: var(--text-2);
  margin-top: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.panel-meta span {
  display: inline-flex;
  flex-direction: column;
  gap: 1px;
}
.panel-meta .meta-label {
  font-size: 0.58rem;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.panel-cat-tag {
  font-size: 0.62rem;
  padding: 2px 6px;
  color: var(--text);
  border: 1px solid var(--border);
  letter-spacing: 0.04em;
  margin-top: 8px;
  display: inline-block;
}

#panel-body {
  padding: 16px 20px;
  flex: 1;
}
.fact-block {
  margin-bottom: 14px;
}
.fact-theme-label {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fact-theme-dot {
  width: 8px;
  height: 8px;
  display: inline-block;
  flex-shrink: 0;
}
.fact-text {
  font-size: 0.75rem;
  color: var(--text);
  line-height: 1.55;
}

#panel-close {
  position: sticky;
  bottom: 0;
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 10px 20px;
}
#panel-close button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-3);
  font-family: inherit;
  font-size: 0.7rem;
  padding: 4px 10px;
  cursor: pointer;
  letter-spacing: 0.06em;
  width: 100%;
}
#panel-close button:hover { border-color: var(--text-2); color: var(--text); }

/* ── Legend ── */
#legend {
  padding: 8px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  flex-shrink: 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.62rem;
  color: var(--text-3);
  letter-spacing: 0.04em;
}
.legend-swatch {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}

/* ── Footer ── */
footer {
  padding: 10px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.version { font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.06em; }

/* ── Mobile ── */
@media (max-width: 768px) {
  :root { --cell-size: 36px; }

  #main {
    flex-direction: column;
    overflow: visible;
  }

  #grid-wrapper {
    overflow-x: auto;
    overflow-y: visible;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
  }

  #panel {
    width: 100%;
    min-width: unset;
    border-left: none;
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 200ms ease;
    max-height: 50vh;
    min-height: 200px;
  }
  #panel.open {
    transform: translateY(0);
  }

  #controls {
    padding: 10px 12px;
  }

  #legend { display: none; }
}
</style>
</head>
<body>

<header>
  <a class="back-link" href="../">< Home</a>
  <h1>Periodic Table Explorer</h1>
  <button class="dark-toggle" id="dark-toggle" aria-pressed="false">dark</button>
</header>

<div id="controls" role="toolbar" aria-label="Theme filters">
  <span class="controls-label">Spotlight</span>
  <button class="theme-btn" data-key="body"    aria-pressed="false">Human Body</button>
  <button class="theme-btn" data-key="spacex"  aria-pressed="false">SpaceX / Rockets</button>
  <button class="theme-btn" data-key="edible"  aria-pressed="false">Lickable / Edible</button>
  <button class="theme-btn" data-key="burning" aria-pressed="false">Burning / Reactive</button>
  <button id="clear-btn">clear all</button>
</div>

<div id="main">
  <div id="grid-wrapper">
    <div id="grid" role="grid" aria-label="Periodic table of elements"></div>
  </div>
  <div id="panel" role="complementary" aria-live="polite" aria-label="Element detail">
    <div id="panel-header">
      <div class="panel-symbol" id="panel-symbol"></div>
      <div class="panel-name" id="panel-name"></div>
      <div class="panel-meta">
        <span><span class="meta-label">Number</span><span id="panel-number"></span></span>
        <span><span class="meta-label">Mass</span><span id="panel-mass"></span></span>
      </div>
      <span class="panel-cat-tag" id="panel-cat"></span>
    </div>
    <div id="panel-body"></div>
    <div id="panel-close"><button id="close-panel-btn">close ×</button></div>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-alkali-metal)"></div>alkali metal</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-alkaline-earth)"></div>alkaline earth</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-transition-metal)"></div>transition metal</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-post-transition)"></div>post-transition</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-metalloid)"></div>metalloid</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-nonmetal)"></div>nonmetal</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-noble-gas)"></div>noble gas</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-lanthanide)"></div>lanthanide</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--cat-actinide)"></div>actinide</div>
</div>

<footer>
  <a class="back-link" href="../">< Home</a>
  <span class="version">v1.0.0</span>
</footer>

<script>
// ─────────────────────────────────────────────
// THEMES
// ─────────────────────────────────────────────
const THEMES = [
  { key: 'body',    label: 'Human Body',       color: 'var(--theme-body)'   },
  { key: 'spacex',  label: 'SpaceX / Rockets', color: 'var(--theme-spacex)' },
  { key: 'edible',  label: 'Lickable / Edible',color: 'var(--theme-edible)' },
  { key: 'burning', label: 'Burning / Reactive',color:'var(--theme-burning)'},
];

// ─────────────────────────────────────────────

// All 118 elements.
// period = chemical period (1–7), group = chemical group (1–18).
// Renderer uses grid-row: period, grid-column: group for normal elements.
// La (57) and Ac (89) stay in the main grid at group 3; they do NOT have fBlock: true.
// fBlock: true → Ce–Lu (58–71) and Th–Lr (90–103) only.
//   displayRow: lanthanides → 9, actinides → 10
//   displayCol: (number - 58 + 4) lanthanides, (number - 90 + 4) actinides
// Theme membership = key presence. Missing key = non-member.

  // ── Period 1 ──────────────────────────────
  {
    symbol: 'H', name: 'Hydrogen', number: 1, mass: 1.008,
    category: 'nonmetal', period: 1, group: 1,
    defaultFact: 'The simplest atom in the universe — one proton, one electron. Three-quarters of all visible matter is hydrogen.',
    themes: {
      body:    { fact: 'Water is two hydrogen atoms bonded to one oxygen. You are roughly 60% water, making hydrogen the most abundant element in your body by number of atoms.' },
      spacex:  { fact: 'SpaceX\'s Raptor engines burn liquid methane (CH₄), while the upper atmosphere exit nozzles on some missions use liquid hydrogen. It produces only water when burned.' },
      edible:  { fact: 'Every food you eat is packed with hydrogen — water, sugars, fats, and proteins all contain it. It\'s in every sip and every bite.' },
      burning: { fact: 'Hydrogen burns with an invisible flame hot enough to melt steel. The Hindenburg disaster (1937) killed 36 people when 200,000 m³ of hydrogen ignited in 34 seconds.' },
    }
  },
  {
    symbol: 'He', name: 'Helium', number: 2, mass: 4.003,
    category: 'noble-gas', period: 1, group: 18,
    defaultFact: 'The only element first discovered in the sun before Earth — its name comes from Helios, the Greek sun god. It was found on Earth 27 years later.',
    themes: {
      spacex: { fact: 'SpaceX uses liquid helium at −269°C to pressurize propellant tanks and purge lines on Falcon 9. When liquid helium leaks, it can trigger catastrophic tank overpressure — this caused the 2016 Amos-6 pad explosion.' },
    }
  },

  // ── Period 2 ──────────────────────────────
  {
    symbol: 'Li', name: 'Lithium', number: 3, mass: 6.941,
    category: 'alkali-metal', period: 2, group: 1,
    defaultFact: 'The lightest metal on Earth — so light it floats on water. Every smartphone, laptop, and electric car runs on lithium batteries.',
    themes: {
      spacex:  { fact: 'SpaceX uses aluminum–lithium alloys in Falcon 9\'s propellant tanks. Adding lithium makes aluminum 10% lighter and 10% stronger — critical when every kilogram costs thousands to launch.' },

      spacex: { fact: 'Beryllium was used in early rocket nozzle inserts for its extreme heat resistance. Its combination of low weight and high stiffness makes it ideal for aerospace, though its toxicity requires careful handling.' },
    }
  },
  {
    symbol: 'B', name: 'Boron', number: 5, mass: 10.811,
    category: 'metalloid', period: 2, group: 13,
    defaultFact: 'The element behind your Pyrex glass and Borax laundry booster. Boron is also a critical neutron absorber in nuclear reactor control rods.',

  {

    category: 'nonmetal', period: 2, group: 14,
    defaultFact: 'The backbone of all life. Carbon can bond with itself in rings, chains, and sheets — creating everything from diamond to graphite to DNA to plastic.',

      edible:  { fact: 'Every calorie you eat is carbon chemistry. Sugar, fat, starch — all carbon rings and chains. Carbon is so central to food that nutritional science once called organic molecules "carbonaceous."' },

    }
  },
  {
    symbol: 'N', name: 'Nitrogen', number: 7, mass: 14.007,
    category: 'nonmetal', period: 2, group: 15,
    defaultFact: 'Nitrogen makes up 78% of the air you breathe — and you exhale almost all of it unchanged. Triple-bonded N₂ is one of the strongest bonds in nature.',
    themes: {
      body:   { fact: 'Nitrogen is in every protein you\'ve ever eaten. Amino acids — the building blocks of protein — all contain nitrogen. You are about 3% nitrogen by mass: ~2 kg in a 70 kg person.' },

  {
    symbol: 'O', name: 'Oxygen', number: 8, mass: 15.999,
    category: 'nonmetal', period: 2, group: 16,
    defaultFact: 'Oxygen makes up 21% of air but ~65% of your body mass. It is the third most abundant element in the universe, forged in dying stars.',

  {
    symbol: 'Mg', name: 'Magnesium', number: 12, mass: 24.305,
    category: 'alkaline-earth', period: 3, group: 2,

  {

    defaultFact: 'Named after Lawrence Livermore National Laboratory in California (a co-discoverer). Livermorium was first made in 2000 at Dubna in a US-Russia collaboration. Its name was officially approved in 2012.',

    themes: {
    }

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeThemes = new Set();
let selectedElement = null;

// ─────────────────────────────────────────────
// GRID POSITION HELPERS
// ─────────────────────────────────────────────
function getDisplayRow(el) {
  if (!el.fBlock) return el.period;
  return el.number >= 90 ? 10 : 9;
}

function getDisplayCol(el) {
  if (!el.fBlock) return el.group;
  if (el.number >= 90) return el.number - 90 + 4;
  return el.number - 58 + 4;
}

// ─────────────────────────────────────────────
// BUILD GRID
// ─────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Validation: assert no two elements share the same (displayRow, displayCol)
  const seen = new Map();
  for (const el of ELEMENTS) {
    const key = `${getDisplayRow(el)},${getDisplayCol(el)}`;
    if (seen.has(key)) {
      console.error(`Grid conflict: ${el.symbol} and ${seen.get(key)} both at (${key})`);
    }
    seen.set(key, el.symbol);
  }

  for (const el of ELEMENTS) {
    const row = getDisplayRow(el);
    const col = getDisplayCol(el);
    const cell = document.createElement('div');
    cell.className = `cell cat-${el.category}`;
    cell.style.gridRow = row;
    cell.style.gridColumn = col;
    cell.dataset.number = el.number;
    cell.setAttribute('role', 'gridcell');
    cell.setAttribute('aria-label', `${el.name}, atomic number ${el.number}`);
    cell.setAttribute('tabindex', '0');

    cell.innerHTML = `
      <span class="num">${el.number}</span>
      <span class="sym">${el.symbol}</span>
      <span class="name-short">${el.name}</span>
      <span class="theme-badge"></span>
    `;

    cell.addEventListener('click', () => openPanel(el, cell));
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPanel(el, cell); }
    });

    grid.appendChild(cell);
  }

  // Gap label row (visual connector between main grid and f-block rows)
  const gapSpan = document.createElement('div');
  gapSpan.style.gridRow = '8';
  gapSpan.style.gridColumn = '1 / 19';
  gapSpan.style.height = '6px';
  grid.appendChild(gapSpan);

  applyThemeHighlights();
}

// ─────────────────────────────────────────────
// THEME HIGHLIGHT RENDER
// ─────────────────────────────────────────────
function applyThemeHighlights() {
  const cells = document.querySelectorAll('.cell');
  const anyActive = activeThemes.size > 0;

  cells.forEach(cell => {
    const num = parseInt(cell.dataset.number, 10);
    const el = ELEMENTS[num - 1];
    const badge = cell.querySelector('.theme-badge');

    // Iterate THEMES array (not activeThemes Set) to preserve leftmost-button tie-break
    const matchingThemes = THEMES.filter(t => activeThemes.has(t.key) && t.key in el.themes);

    if (!anyActive) {
      cell.classList.remove('dimmed');
      cell.style.backgroundColor = '';
      badge.style.display = 'none';
    } else if (matchingThemes.length === 0) {
      cell.classList.add('dimmed');
      cell.style.backgroundColor = '';
      badge.style.display = 'none';
    } else {
      cell.classList.remove('dimmed');
      // Use CSS variable resolved value for leftmost matching theme
      cell.style.backgroundColor = `var(--theme-${matchingThemes[0].key})`;
      if (matchingThemes.length >= 2) {
        badge.textContent = matchingThemes.length;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    }

    // Keep selected cell border
    if (selectedElement && selectedElement.number === num) {
      cell.classList.add('selected');
    } else {
      cell.classList.remove('selected');
    }
  });
}

// ─────────────────────────────────────────────
// DETAIL PANEL
// ─────────────────────────────────────────────
const CAT_LABELS = {
  'alkali-metal':     'Alkali Metal',
  'alkaline-earth':   'Alkaline Earth',
  'transition-metal': 'Transition Metal',
  'post-transition':  'Post-Transition Metal',
  'metalloid':        'Metalloid',
  'nonmetal':         'Nonmetal',
  'noble-gas':        'Noble Gas',
  'lanthanide':       'Lanthanide',
  'actinide':         'Actinide',
};

function openPanel(el, cellEl) {
  selectedElement = el;
  applyThemeHighlights();

  document.getElementById('panel-symbol').textContent = el.symbol;
  document.getElementById('panel-name').textContent = el.name;
  document.getElementById('panel-number').textContent = el.number;
  document.getElementById('panel-mass').textContent = el.mass;
  document.getElementById('panel-cat').textContent = CAT_LABELS[el.category] || el.category;

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  // Matching active themes for this element
  const matchingThemes = THEMES.filter(t => activeThemes.has(t.key) && t.key in el.themes);

  if (matchingThemes.length === 0) {
    // No theme active, or element not in any active theme → show defaultFact
    const block = document.createElement('div');
    block.className = 'fact-block';
    block.innerHTML = `<p class="fact-text">${el.defaultFact}</p>`;
    body.appendChild(block);
  } else {
    // Show theme-specific facts for matching themes
    for (const theme of matchingThemes) {
      const block = document.createElement('div');
      block.className = 'fact-block';
      block.innerHTML = `
        <div class="fact-theme-label">
          <span class="fact-theme-dot" style="background:var(--theme-${theme.key})"></span>
          ${theme.label}
        </div>
        <p class="fact-text">${el.themes[theme.key].fact}</p>
      `;
      body.appendChild(block);
    }
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selectedElement = null;
  applyThemeHighlights();
}

// ─────────────────────────────────────────────
// THEME TOGGLE
// ─────────────────────────────────────────────
function toggleTheme(key) {
  if (activeThemes.has(key)) {
    activeThemes.delete(key);
  } else {
    activeThemes.add(key);
  }

  // Update button states
  document.querySelectorAll('.theme-btn').forEach(btn => {
    const active = activeThemes.has(btn.dataset.key);
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });

  // Re-render panel facts if open
  if (selectedElement) {
    openPanel(selectedElement, null);
  }

  applyThemeHighlights();
}

function clearAll() {
  activeThemes.clear();
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.remove('active');
    btn.setAttribute('aria-pressed', 'false');
  });
  applyThemeHighlights();
  if (selectedElement) {
    openPanel(selectedElement, null);
  }
}

// ─────────────────────────────────────────────
// DARK MODE
// ─────────────────────────────────────────────
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('dark-toggle').setAttribute('aria-pressed', isDark ? 'true' : 'false');
  document.getElementById('dark-toggle').textContent = isDark ? 'light' : 'dark';
  try { localStorage.setItem('foxi-periodic-dark', isDark ? '1' : '0'); } catch(e) {}
}

// ─────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => toggleTheme(btn.dataset.key));
});
document.getElementById('clear-btn').addEventListener('click', clearAll);
document.getElementById('close-panel-btn').addEventListener('click', closePanel);
document.getElementById('dark-toggle').addEventListener('click', toggleDark);

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
try {
  if (localStorage.getItem('foxi-periodic-dark') === '1') {
    document.body.classList.add('dark');
    document.getElementById('dark-toggle').textContent = 'light';
    document.getElementById('dark-toggle').setAttribute('aria-pressed', 'true');
  }
} catch(e) {}

buildGrid();
</script>
