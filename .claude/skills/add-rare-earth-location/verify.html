<!-- Coordinate verification harness for rare-earth.
     Renders ESRI World Imagery centred on a lat/lon with a red crosshair, so you can
     confirm a candidate coordinate lands ON its subject before adding it.
     Usage:  file://<abs-path>/verify.html?lat=<LAT>&lon=<LON>&z=<ZOOM>&name=<LABEL>
     z: 14 wide (~7km) -> 18 tight (~450m). Drive it via the /browse skill; see
     references/verify-imagery.md. Self-contained except Leaflet + ESRI tiles (needs network). -->
<meta charset="utf-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html,body{margin:0;height:100%}
  #m{height:100%}
  .xh{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;pointer-events:none}
  .xh div{position:absolute;background:#ff2d2d}
  .xh .v{width:2px;height:60px;left:-1px;top:-30px}
  .xh .h{height:2px;width:60px;top:-1px;left:-30px}
  .xh .r{width:44px;height:44px;left:-22px;top:-22px;background:none;border:2px solid #ff2d2d;border-radius:50%}
  #lbl{position:absolute;bottom:8px;left:8px;z-index:500;background:#000;color:#fff;
       font:12px monospace;padding:4px 8px}
</style>
<div id="m"></div>
<div class="xh"><div class="v"></div><div class="h"></div><div class="r"></div></div>
<div id="lbl"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const p = new URLSearchParams(location.search);
  const lat = parseFloat(p.get('lat')), lon = parseFloat(p.get('lon'));
  const z = parseInt(p.get('z') || '16');
  document.getElementById('lbl').textContent =
    (p.get('name') || '') + '  @ ' + lat + ', ' + lon + '  z' + z;
  const map = L.map('m', { center: [lat, lon], zoom: z, zoomControl: false, attributionControl: false });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
             { maxZoom: 19 }).addTo(map);
  map.whenReady(() => setTimeout(() => { window.__tilesDone = true; }, 2500));
</script>
