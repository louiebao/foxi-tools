<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL Quine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(17px, 1.3vw, 26px); }

  :root {
    --bg:           #f8f8f5;
    --bg-panel:     #edeae3;
    --bg-output:    #f3f1eb;
    --text:         #222;
    --text-2:       #666;
    --text-3:       #777;
    --border:       #d0d0cc;
    --border-ui:    #ccc;
    --border-hover: #888;
    --accent:       #4a7ab4;
  }

  body {
    font-family: 'Courier New', monospace;
    font-size: 0.93rem;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  header h1 {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }
  header p {
    font-size: 0.73rem;
    color: var(--text-3);
    letter-spacing: 0.06em;
  }

  main {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .pane-row {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  /* Per-step explanation strip */
  .step-explanation strong { white-space: nowrap; }
  .step-explanation {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: #d8d4cb;
    font-size: 0.73rem;
    color: var(--text-2);
    line-height: 1.6;
    flex-shrink: 0;
    min-height: 2.6em;
    display: flex;
    align-items: center;
  }

  .pane {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    transition: border-left 0.2s;
  }
  #query-pane.converged  { border-left: 3px solid var(--accent); }
  #result-pane.converged { border-left: 3px solid var(--accent); }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 42px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }
  .pane-label {
    font-size: 0.67rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
    flex-shrink: 0;
  }

  .query-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .query-controls .btn-primary,
  .query-controls .btn-secondary {
    width: auto;
    padding: 5px 12px;
  }
  .step-counter {
    font-size: 0.6rem;
    color: var(--text-3);
    letter-spacing: 0.06em;
    min-width: 3em;
    text-align: right;
  }

  pre {
    flex: 1;
    padding: 16px 18px;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    line-height: 1.75;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .query-pre  { background: var(--bg);        color: var(--text); }
  .result-pre { background: var(--bg-output); color: var(--text); }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    font-size: 0.73rem;
    letter-spacing: 0.06em;
    text-align: center;
    padding: 24px;
  }

  .btn-primary {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 9px 14px;
    font-family: 'Courier New', monospace;
    font-size: 0.67rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.75; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border-ui);
    padding: 7px 14px;
    font-family: 'Courier New', monospace;
    font-size: 0.67rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--border-hover); color: var(--text); }
  .btn-secondary:disabled { opacity: 0.35; cursor: default; }

  .back-link {
    font-size: 0.73rem;
    color: var(--text-3);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .back-link:hover { color: var(--text); }

  footer {
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.73rem;
    flex-shrink: 0;
  }

  /* ── Mobile ≤768px ──────────────────────────────────────────── */
  @media (max-width: 768px) {
    body { height: auto; overflow: auto; min-height: 100dvh; }
    main { flex: none; }
    .query-controls .btn-primary,
    .query-controls .btn-secondary { min-height: 44px; }
    pre { min-height: 40vh; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>SQL Quine</h1>
    <p>A query that replicates itself</p>
  </div>
</header>


<main>

  <div class="step-explanation" id="step-explanation" aria-live="polite"></div>

  <div class="pane-row">

    <div class="pane" id="query-pane">
      <div class="pane-header">
        <span class="pane-label">Query</span>
        <div class="query-controls">
          <button class="btn-secondary" id="prev-btn"    aria-label="Previous step" disabled>Prev</button>
          <button class="btn-primary"   id="next-btn"    aria-label="Next step"     disabled>Next</button>
          <button class="btn-secondary" id="restart-btn" aria-label="Restart"       disabled>Restart</button>
          <div class="step-counter" id="step-counter" aria-label="Step 0 of 5" role="status">—</div>
        </div>
      </div>
      <pre class="query-pre" id="query-pre" aria-label="Current SQL query" aria-live="polite"></pre>
    </div>

    <div class="pane" id="result-pane">
      <div class="pane-header">
        <span class="pane-label">Result</span>
      </div>
      <div class="empty-state" id="result-empty">Press Next to step through the query</div>
      <pre class="result-pre" id="result-pre" aria-label="SQL query result" aria-live="polite" style="display:none"></pre>
    </div>

  </div>

</main>

<footer>
  <a class="back-link" href="../">&lt; Home</a>
</footer>

<script>
// T-SQL quine — simulated step by step
// char(39) = '   char(41) = )   space(1) = [space]
const T4    = "space(1) + char(39) + space(1) + char(39)";
const PRE4  = "select replace(" + T4 + ", space(1), ";
const T     = "space(1) + char(39) + space(1) + char(39) + char(41)";
const PRE   = "select replace(" + T + ", space(1), ";
const QUINE = PRE + "'" + PRE + "')";

const IND = "\n              ";  // indent to align under opening paren
const DISP4 = "select replace(" + T4 + IND + ", space(1)" + IND + ", '" + PRE4 + "')";
const DISP5 = "select replace(" + T  + IND + ", space(1)" + IND + ", '" + PRE  + "')";

const STEPS = [
  {
    sql:     "select 'select'",
    hl:      "'select'",
    result:  "select",
    explain: "Step 1 / 5 — To replicate the query, the result must contain the full query text. Wrapping it in quotes makes it a string — but SELECT only returns the text inside the quotes. The quotes and SELECT keyword are stripped from the result. Already stuck.",
  },
  {
    sql:     "select char(39) + 'select' + char(39)",
    hl:      "char(39)",
    result:  "'select'",
    explain: "Step 2 / 5 — char(39) returns a single-quote without writing one inside a string literal. Wrapping the output with char(39) gets quotes into the result. But now the query says char(39) while the result shows ' — they look completely different.",
  },
  {
    sql:     "select char(39) + 'select char(39)' + char(39)",
    hl:      "'select char(39)'",
    result:  "'select char(39)'",
    explain: "Step 3 / 5 — Update the template string to contain the full query text. The result now includes char(39). Getting closer — but the outer quotes wrapping the template are still not in the result. Every character added to close the gap creates another gap.",
  },
  {
    sql:     PRE4 + "'" + PRE4 + "')",
    display: DISP4,
    hl:      "space(1)",
    result:  PRE4 + "'" + PRE4 + "'",
    explain: "Step 4 / 5 — Breakthrough: use space(1) as a placeholder inside the template. A space needs no escaping inside a string. REPLACE() substitutes every space with the query prefix at runtime. Almost there — but the closing ) is missing from the result. It belongs to the REPLACE() call itself, outside the template.",
  },
  {
    sql:     QUINE,
    display: DISP5,
    hl:      "replace(",
    result:  QUINE,
    explain: "Step 5 / 5 — Add char(41) to the template. The closing ) now lives inside the template and gets carried into the result. REPLACE is single-pass: it substitutes each space once and stops — the spaces introduced by the replacement are never re-scanned. Result equals query exactly.",
  },
];

// ── DOM refs ──────────────────────────────────────────────────────
const queryPane       = document.getElementById('query-pane');
const resultPane      = document.getElementById('result-pane');
const queryPre        = document.getElementById('query-pre');
const resultPre       = document.getElementById('result-pre');
const resultEmpty     = document.getElementById('result-empty');
const nextBtn         = document.getElementById('next-btn');
const prevBtn         = document.getElementById('prev-btn');
const restartBtn      = document.getElementById('restart-btn');
const stepCounter     = document.getElementById('step-counter');
const stepExplanation = document.getElementById('step-explanation');

let stepIdx = 0;  // 0 = nothing stepped yet; n = steps 1..n have been shown

// ── Controls ──────────────────────────────────────────────────────
function updateButtons() {
  nextBtn.disabled    = stepIdx >= STEPS.length;
  prevBtn.disabled    = stepIdx === 0;
  restartBtn.disabled = stepIdx === 0;
}

function updateCounter() {
  const n    = stepIdx;
  const tot  = STEPS.length;
  const done = n === tot;
  stepCounter.textContent = n === 0 ? '—' : `${n} / ${tot}${done ? ' ✓' : ''}`;
  stepCounter.setAttribute('aria-label', `Step ${n} of ${tot}`);
}

// ── Query panel rendering with bold highlight ─────────────────────
function renderQuery(step) {
  queryPre.textContent = step.display ?? step.sql;
}

// ── Result panel ──────────────────────────────────────────────────
function showResult(text) {
  resultEmpty.style.display = 'none';
  resultPre.style.display   = '';
  resultPre.textContent     = text;
}
function showResultEmpty(msg) {
  resultEmpty.style.display = '';
  resultEmpty.textContent   = msg;
  resultPre.style.display   = 'none';
}

// ── Convergence highlight ─────────────────────────────────────────
function updateConvergence(step, result) {
  const conv = result === step.sql;
  queryPane.classList.toggle('converged',  conv);
  resultPane.classList.toggle('converged', conv);
}
function clearConvergence() {
  queryPane.classList.remove('converged');
  resultPane.classList.remove('converged');
}

// ── Render current stepIdx ────────────────────────────────────────
function renderState() {
  updateCounter();
  updateButtons();

  if (stepIdx === 0) {
    renderQuery(STEPS[0]);
    showResultEmpty('Press Next to step through the query');
    stepExplanation.textContent = 'Five steps show how the quine is built — starting from the naive attempt and arriving at the working solution. Press Next to begin.';
    clearConvergence();
    return;
  }

  const step = STEPS[stepIdx - 1];
  renderQuery(step);
  stepExplanation.innerHTML = step.explain.replace(/^(Step \d+ \/ \d+)/, '<strong>$1</strong>');
  const displayResult = step.display && step.result === step.sql ? step.display : step.result;
  showResult(displayResult);
  updateConvergence(step, step.result);
}

// ── Button handlers ───────────────────────────────────────────────
nextBtn.addEventListener('click', () => {
  if (stepIdx >= STEPS.length) return;
  stepIdx++;
  renderState();
});

prevBtn.addEventListener('click', () => {
  if (stepIdx === 0) return;
  stepIdx--;
  renderState();
});

restartBtn.addEventListener('click', () => {
  stepIdx = 0;
  renderState();
});

renderState();
</script>

</body>
</html>
