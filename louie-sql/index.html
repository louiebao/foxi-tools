<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Louie SQL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #f8f8f5;
    color: #222;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 22px;
    border-bottom: 1px solid #d0d0cc;
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 3px; }
  .tool-title {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.1em;
    color: #222;
  }
  .tool-tagline {
    font-size: 12px;
    color: #777;
    letter-spacing: 0.06em;
  }
  .home-link {
    font-size: 13px;
    color: #777;
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .home-link:hover { color: #222; }

  /* ── Editor grid ── */
  main {
    display: grid;
    grid-template-columns: 1fr 148px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ── Panes ── */
  .pane {
    display: flex;
    flex-direction: column;
    border-right: 1px solid #d0d0cc;
    min-height: 0;
  }
  .pane-right { border-right: none; }

  .pane-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    height: 42px;
    border-bottom: 1px solid #d0d0cc;
    background: #edeae3;
    flex-shrink: 0;
  }
  .pane-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #777;
  }
  .pane-actions { display: flex; gap: 6px; }

  textarea {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    padding: 18px 20px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.75;
    color: #222;
    background: #f8f8f5;
    tab-size: 4;
  }
  textarea::placeholder { color: #ccc; }
  #output-sql { background: #f3f1eb; color: #333; }

  /* ── Center column ── */
  .center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border-right: 1px solid #d0d0cc;
    background: #edeae3;
  }
  .arrow { font-size: 16px; color: #ccc; user-select: none; }

  /* ── Buttons ── */
  .btn-primary {
    background: #222;
    color: #f8f8f5;
    border: none;
    padding: 10px 32px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .btn-primary:hover { background: #444; }
  .btn-primary:active { background: #111; }

  .btn-secondary {
    background: transparent;
    color: #666;
    border: 1px solid #ccc;
    padding: 5px 12px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .btn-secondary:hover:not(:disabled) { border-color: #888; color: #222; }
  .btn-secondary:active:not(:disabled) { background: #eee; }
  .btn-secondary:disabled { opacity: 0.35; cursor: default; }

  /* ── Footer ── */
  footer {
    padding: 11px 22px;
    border-top: 1px solid #d0d0cc;
    font-size: 13px;
    flex-shrink: 0;
  }
  footer a { color: #777; text-decoration: none; letter-spacing: 0.04em; }
  footer a:hover { color: #222; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="tool-title">Louie SQL</span>
    <span class="tool-tagline">Highly Opinionated SQL Prettifier</span>
  </div>
</header>

<main>
  <div class="pane pane-left">
    <div class="pane-header">
      <span class="pane-label">SQL</span>
    </div>
    <textarea id="input-sql" spellcheck="false" placeholder="Paste your SQL here…"></textarea>
  </div>

  <div class="center-col">
    <button id="btn-format" class="btn-primary">Format -></button>
  </div>

  <div class="pane pane-right">
    <div class="pane-header">
      <div class="pane-actions">
        <button id="btn-copy" class="btn-secondary" disabled>Copy</button>
        <button id="btn-save" class="btn-secondary" disabled>Save</button>
      </div>
    </div>
    <textarea id="output-sql" readonly spellcheck="false"></textarea>
  </div>
</main>

<footer>
  <a href="../">← Home</a>
</footer>

<script>
function formatSQL(sql) {
  let s = sql.trim();

  // Rule 1: All lowercase
  s = s.toLowerCase();

  // Rule 2: Tabs → 4 spaces
  s = s.replace(/\t/g, '    ');

  // Rule 3: Major clauses start on a new line (longer phrases first)
  s = s.replace(
    /\b(left join|right join|full join|cross apply|select|from|where|join|and)\b/g,
    '\n$1'
  );
  s = s.trim();

  // Rule 4: and/or paren-block formatting
  // 4a: 'and (' → put '(' on its own line
  s = s.replace(/\band\s*\(/g, 'and\n(');
  // 4b: 'or' → newline + 4-space indent
  s = s.replace(/\bor\b/g, '\n    or');
  // 4c: After '(' on its own line, first condition gets 7-space indent
  //     (aligns with text after '    or ')
  s = s.replace(/\n\(([^\n(])/g, '\n(\n       $1');
  // 4d: Close paren on its own line
  s = s.replace(/([^(\n])\)/g, '$1\n)');

  // Rule 5: Leading commas
  s = s.replace(/,\s*/g, '\n, ');

  // Rule 6: If ON condition is on its own line after a join, merge it back onto
  // the join line. Handles inputs written as:
  //   left join orders o
  //   on u.id = o.user_id
  // → left join orders o on u.id = o.user_id
  // Must run before rule 7 so the alignment finds all ON keywords on the same line.
  s = s.replace(
    /^((?:left |right |full |cross )?join\b[^\n]+)\n\s*on\s+/gm,
    '$1 on '
  );

  // Rule 7: Align ON conditions in JOIN clauses
  const joinOnRe = /^((?:left |right |full |cross )?join\s+\S+(?:\s+(?:as\s+)?\w+)?)\s+on\s+(.+)$/;
  const lines = s.split('\n');
  let maxPfx = 0;
  lines.forEach(l => { const m = l.match(joinOnRe); if (m) maxPfx = Math.max(maxPfx, m[1].length); });
  s = lines.map(l => {
    const m = l.match(joinOnRe);
    if (!m) return l;
    return m[1] + ' '.repeat(maxPfx - m[1].length + 1) + 'on ' + m[2];
  }).join('\n');

  // Rule 8: WHERE always followed by 1 = 1; original condition becomes first AND
  s = s.replace(/\bwhere\b(?!\s*1\s*=\s*1)\s*(.+)/g, 'where 1 = 1\nand $1');

  // Rule 9: 4-space indent for column list between SELECT and FROM.
  // After rule 5 (leading commas), column lines start with ', '.
  // Walk lines: once inside a select, indent ', ' lines until a non-', ' line.
  {
    const ls = s.split('\n');
    let inCols = false;
    s = ls.map(line => {
      if (/^select\b/.test(line)) { inCols = true; return line; }
      if (inCols && /^, /.test(line)) return '    ' + line;
      inCols = false;
      return line;
    }).join('\n');
  }

  // Final clean-up: collapse multiple consecutive blank lines into one
  s = s.replace(/\n{2,}/g, '\n');

  return s;
}

// ── State ──
function setOutputState(active) {
  document.getElementById('btn-copy').disabled = !active;
  document.getElementById('btn-save').disabled = !active;
}

// ── Format ──
document.getElementById('btn-format').addEventListener('click', () => {
  const raw = document.getElementById('input-sql').value.trim();
  if (!raw) return;
  try {
    document.getElementById('output-sql').value = formatSQL(raw);
    setOutputState(true);
  } catch (_) {
    document.getElementById('output-sql').value = '— error formatting SQL —';
    setOutputState(false);
  }
});

// ── Clear ──
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('input-sql').value = '';
  document.getElementById('output-sql').value = '';
  setOutputState(false);
  document.getElementById('input-sql').focus();
});

// ── Copy ──
document.getElementById('btn-copy').addEventListener('click', () => {
  const btn = document.getElementById('btn-copy');
  const text = document.getElementById('output-sql').value;
  const done = () => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => {
      document.getElementById('output-sql').select();
      document.execCommand('copy');
      done();
    });
  } else {
    document.getElementById('output-sql').select();
    document.execCommand('copy');
    done();
  }
});

// ── Save ──
document.getElementById('btn-save').addEventListener('click', () => {
  const blob = new Blob([document.getElementById('output-sql').value], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'formatted.sql';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
});
</script>

</body>
</html>
