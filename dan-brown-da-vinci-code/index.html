<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Da Vinci Code — Chapter Journey</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f8f8f5;
  color: #222;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  padding: 16px 24px 12px;
  border-bottom: 1px solid #d0d0cc;
  flex-shrink: 0;
}
header h1 {
  font-size: 15px;
  font-weight: normal;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
header p {
  margin-top: 4px;
  font-size: 11px;
  color: #888;
  letter-spacing: 0.06em;
}

/* ── Chapter Strip ── */
.strip-wrap {
  border-bottom: 1px solid #d0d0cc;
  background: #f2f1ee;
  flex-shrink: 0;
  padding: 8px 16px;
  overflow-x: auto;
  scrollbar-width: thin;
}
.strip {
  display: flex;
  gap: 3px;
  width: max-content;
}
.chip {
  min-width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.04em;
  background: #e2e0d8;
  border: 1px solid #ccc;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
  color: #555;
  border-radius: 2px;
}
.chip:hover { background: #d4d2c8; color: #222; }
.chip.selected {
  background: #2a2a2a;
  border-color: #111;
  color: #f8f8f5;
}
.chip.prologue, .chip.epilogue {
  min-width: 22px;
  font-style: italic;
  color: #888;
}
.chip.prologue.selected, .chip.epilogue.selected { color: #f8f8f5; }

/* ── Summary Strip ── */
.summary-strip {
  padding: 8px 24px;
  border-bottom: 1px solid #d0d0cc;
  flex-shrink: 0;
  min-height: 52px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  background: #f8f8f5;
}
#location-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #888;
}
#summary {
  font-size: 12px;
  color: #444;
  line-height: 1.5;
}

/* ── Main 3-column area ── */
.main {
  display: grid;
  grid-template-columns: 220px 1fr 220px;
  flex: 1;
  overflow: hidden;
}

/* ── Panels ── */
.panel {
  border-right: 1px solid #d8d6d0;
  overflow-y: auto;
  padding: 14px;
  scrollbar-width: thin;
}
.panel:last-child { border-right: none; border-left: 1px solid #d8d6d0; }
.panel-title {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 10px;
}
.panel-item {
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}
.panel-item:last-child { border-bottom: none; }
.item-name {
  display: block;
  font-size: 12px;
  color: #222;
}
.item-role {
  display: block;
  font-size: 11px;
  color: #888;
  margin-top: 2px;
  line-height: 1.4;
}
.panel-empty {
  font-size: 12px;
  color: #bbb;
  padding: 4px 0;
}

/* ── Location diagram ── */
.map-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #f8f8f5;
  cursor: grab;
  position: relative;
}
.map-wrap:active { cursor: grabbing; }
.map-wrap svg {
  width: 100%;
  height: 100%;
  max-height: 100%;
  transition: transform 0.1s ease-out;
  transform-origin: center center;
}
.zoom-hint {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #ccc;
  letter-spacing: 0.06em;
  pointer-events: none;
  white-space: nowrap;
}

.journey-line {
  stroke: #d0cec8;
  stroke-width: 1;
  stroke-dasharray: 4 4;
  fill: none;
}
.journey-flight {
  stroke-dasharray: 6 5;
  stroke: #bbb;
}
.city-label {
  font-family: 'Courier New', monospace;
  font-size: 7px;
  fill: #d0cec8;
  letter-spacing: 0.14em;
}
.loc-node {
  fill: #e2e0d8;
  stroke: #c0bdb5;
  stroke-width: 1;
  cursor: pointer;
  transition: fill 0.2s;
}
.loc-node.active {
  fill: #8b5e2e;
  stroke: #6a4520;
}
.loc-label {
  font-family: 'Courier New', monospace;
  font-size: 8px;
  fill: #aaa;
  pointer-events: none;
}
.loc-label.active { fill: #8b5e2e; }

/* ── Footer ── */
footer {
  padding: 10px 24px;
  border-top: 1px solid #d0d0cc;
  font-size: 11px;
  color: #aaa;
  letter-spacing: 0.06em;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 20px;
}
.back-link {
  color: #888;
  text-decoration: none;
  letter-spacing: 0.04em;
}
.back-link:hover { color: #222; }
</style>
</head>

// ── Engine ────────────────────────────────────────────────────────────────

let currentChapter = 1;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getChipLabel(n) {
  if (CHAPTERS[n]?.label) return CHAPTERS[n].label;
  return String(n - 1); // novel chapter number
}

function buildStrip() {
  const strip = document.getElementById('strip');
  for (let n = 1; n <= 105; n++) {
    const chip = document.createElement('div');
    chip.className = 'chip' + (n === 1 ? ' prologue' : n === 105 ? ' epilogue' : '');
    chip.dataset.ch = n;
    chip.textContent = getChipLabel(n);
    chip.title = n === 1 ? 'Prologue' : n === 105 ? 'Epilogue' : `Chapter ${n - 1}`;
    chip.addEventListener('click', () => selectChapter(n));
    strip.appendChild(chip);
  }
}

function selectChapter(n) {
  if (!CHAPTERS[n]) return;
  currentChapter = n;
  const ch = CHAPTERS[n];

  // Strip
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('selected', +c.dataset.ch === n)
  );
  document.querySelector(`.chip[data-ch="${n}"]`)
    ?.scrollIntoView({ block: 'nearest', inline: 'nearest' });

  // Summary + location label
  const locKey = ch.location || (ch.locations && ch.locations[0]);
  const loc = locKey ? LOCATIONS[locKey] : null;
  document.getElementById('location-label').textContent = loc ? loc.label : '';
  document.getElementById('summary').textContent = ch.summary || '';

  // Location nodes
  document.querySelectorAll('.loc-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.loc-label').forEach(l => l.classList.remove('active'));

  const activeKeys = ch.locations || (ch.location ? [ch.location] : []);
  activeKeys.forEach(key => {
    document.querySelector(`.loc-node[data-loc="${key}"]`)?.classList.add('active');
    document.querySelector(`.loc-label[data-loc="${key}"]`)?.classList.add('active');
  });

  // Characters
  const charsEl = document.getElementById('chars-list');
  charsEl.innerHTML = ch.characters.length
    ? ch.characters.map(id => {
        const c = CHARACTERS[id];
        if (!c) return '';
        return `<div class="panel-item"><span class="item-name">${esc(c.name)}</span><span class="item-role">${esc(c.role)}</span></div>`;
      }).join('')
    : '<div class="panel-empty">—</div>';

  // Artefacts
  const artEl = document.getElementById('artefacts-list');
  artEl.innerHTML = ch.artefacts.length
    ? ch.artefacts.map(id => {
        const a = ARTEFACTS[id];
        if (!a) return '';
        return `<div class="panel-item"><span class="item-name">${esc(a.name)}</span><span class="item-role">${esc(a.desc)}</span></div>`;
      }).join('')
    : '<div class="panel-empty">—</div>';
}

// Keyboard — attached to document, prevent scroll only for nav keys
document.addEventListener('keydown', e => {
  if (['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(e.key)) {
    e.preventDefault();
    if (e.key === 'ArrowLeft')  selectChapter(Math.max(1, currentChapter - 1));
    if (e.key === 'ArrowRight') selectChapter(Math.min(105, currentChapter + 1));
    if (e.key === 'Home')       selectChapter(1);
    if (e.key === 'End')        selectChapter(105);
  }
});

// ── Zoom ──────────────────────────────────────────────────────────────────
let mapZoom = 1;
const mapSvg = document.getElementById('map');
const mapWrap = document.getElementById('map-wrap');

mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.18 : 1 / 1.18;
  mapZoom = Math.max(0.4, Math.min(6, mapZoom * factor));
  mapSvg.style.transform = `scale(${mapZoom})`;
}, { passive: false });

mapWrap.addEventListener('dblclick', () => {
  mapZoom = 1;
  mapSvg.style.transform = 'scale(1)';
});

// Init
buildStrip();
selectChapter(1);
</script>
