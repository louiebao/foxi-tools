<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Life in Months</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(15px, 1.1vw, 22px); }
  :root { --cell: clamp(12px, 1.2vw, 22px); }
  body {
    background: #f8f8f5;
    color: #222;
    font-family: 'Courier New', monospace;
    font-size: 0.93rem;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 20%;
    height: 100dvh;
    overflow: hidden;
  }

  header {
    padding: 16px 32px 12px;
    border-bottom: 1px solid #d0d0cc;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    grid-column: 1 / -1;
  }
  header h1 {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: 0.2em;
    color: #222;
    text-transform: uppercase;
  }
  .back-link {
    font-size: 0.73rem;
    color: #888;
    text-decoration: none;
    letter-spacing: 0.06em;
  }
  .back-link:hover { color: #333; }
  .born-label { color: #333; font-size: 0.87rem; }
  @keyframes dob-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .dob-hint { animation: dob-pulse 1.6s ease-in-out infinite; }
  #birthdate-display {
    background: transparent;
    border: none;
    border-bottom: 1px solid #bbb;
    color: #333;
    font-family: inherit;
    font-size: 0.93rem;
    padding: 2px 4px;
    outline: none;
    width: auto;
    min-width: 72px;
    field-sizing: content;
    cursor: pointer;
  }
  #birthdate-display:focus { border-bottom-color: #333; border-bottom-width: 2px; color: #111; }


  .grid-section {
    padding: 16px 32px;
    overflow-x: hidden;
    overflow-y: auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    grid-row: 2;
    grid-column: 1;
  }

  .grid-outer {
    display: flex;
    gap: 0;
  }

  .month-axis {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 8px;
    margin-top: calc(var(--cell) + 10px);
    flex-shrink: 0;
  }
  .month-label {
    height: var(--cell);
    width: calc(var(--cell) + 10px);
    font-size: 0.67rem;
    color: #555;
    transition: color 0.1s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .grid-inner {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .year-row {
    display: flex;
    gap: 2px;
    margin-bottom: 6px;
    height: calc(var(--cell) + 4px);
    align-items: flex-end;
  }
  .year-label {
    width: var(--cell);
    font-size: 0.6rem;
    color: #555;
    text-align: left;
    flex-shrink: 0;
    overflow: visible;
    white-space: nowrap;
  }

  .month-row {
    display: flex;
    gap: 2px;
    margin-bottom: 2px;
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    flex-shrink: 0;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.1s;
  }
  .cell.pre-birth     { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .cell.future        { background: #e8e8e6; border-color: #ddd; }
  .cell.lived         { background: #aaa;    border-color: #999; }
  .cell.has-note      { background: #999;    border-color: #888; }
  .cell.cat-life      { background: #6ba870; border-color: #5a9360; }
  .cell.cat-work      { background: #5a8ec4; border-color: #4a7ab4; }
  .cell.cat-investment{ background: #d46a6a; border-color: #c45a5a; }
  .cell.cat-business  { background: #9456c8; border-color: #8446b8; }
  .cell.cat-multi     { background: #c8a830; border-color: #b89020; }
  .cell.current       { background: #444;    border-color: #333; }
  .cell.selected      { outline: 1px solid #444; outline-offset: 1px; }
  .cell:focus-visible { outline: 2px solid #555; outline-offset: 2px; }
  .month-label.active { color: #111; font-weight: bold; }
  .cell:hover         { border-color: #888 !important; }

  #panel {
    border-left: 1px solid #d0d0cc;
    padding: 14px 32px;
    background: #efefec;
    overflow: auto;
    grid-row: 2;
    grid-column: 2;
  }
  .panel-placeholder {
    color: #666;
    font-size: 0.87rem;
    letter-spacing: 0.08em;
    padding: 14px 0;
    text-align: center;
  }
  .panel-open {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    align-items: start;
  }
  .panel-meta .month-name { font-size: 0.87rem; color: #333; letter-spacing: 0.06em; margin-bottom: 6px; }
  .panel-meta .age        { font-size: 2.13rem; color: #333; letter-spacing: -0.03em; line-height: 1; }
  .panel-meta .age-label  { font-size: 0.73rem; color: #666; letter-spacing: 0.1em; margin-top: 3px; }
  .field-wrap      { display: flex; flex-direction: column; }
  .categories-wrap { display: flex; flex-direction: column; }
  .field-label {
    font-size: 0.73rem; letter-spacing: 0.12em; text-transform: uppercase; color: #444; margin-bottom: 6px;
  }
  .category-check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 0.93rem;
  }
  .category-check input[type="checkbox"] { cursor: pointer; width: 14px; height: 14px; accent-color: #555; }
  .category-check label { cursor: pointer; color: #333; }
  textarea {
    background: transparent;
    border: none;
    color: #222;
    font-family: inherit;
    font-size: 0.87rem;
    line-height: 1.6;
    resize: none;
    width: 100%;
    outline: none;
    padding: 2px 0;
    height: calc(14 * var(--cell) - 48px);
    min-height: 60px;
  }
  textarea:focus { color: #222; outline: 1px solid #aaa; outline-offset: 4px; }
  textarea::placeholder { color: #888; }

  footer {
    padding: 8px 32px;
    border-top: 1px solid #d0d0cc;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    grid-column: 1 / -1;
  }
  footer button {
    background: transparent;
    border: 1px solid #aaa;
    color: #444;
    font-family: inherit;
    font-size: 0.73rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    cursor: pointer;
  }
  footer button:hover { border-color: #666; color: #111; }
  input[type="file"] { display: none; }
  .legend { margin-left: auto; display: flex; gap: 16px; }
  .version { font-size: 0.67rem; color: #aaa; letter-spacing: 0.06em; margin-left: 16px; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 0.73rem; color: #555; letter-spacing: 0.05em; }
  .dot { width: 8px; height: 8px; border: 1px solid transparent; flex-shrink: 0; }
  .dot.future     { background: #e8e8e6; border-color: #ddd; }
  .dot.lived      { background: #aaa;    border-color: #999; }
  .dot.life       { background: #6ba870; border-color: #5a9360; }
  .dot.work       { background: #5a8ec4; border-color: #4a7ab4; }
  .dot.investment { background: #d46a6a; border-color: #c45a5a; }
  .dot.business   { background: #9456c8; border-color: #8446b8; }
  .dot.multi      { background: #c8a830; border-color: #b89020; }
  .dot.current    { background: #444;    border-color: #333; }

  #tooltip {
    position: fixed;
    display: none;
    background: #fff;
    border: 1px solid #ccc;
    padding: 6px 10px;
    font-size: 0.73rem;
    color: #333;
    letter-spacing: 0.02em;
    line-height: 1.5;
    max-width: 200px;
    white-space: pre-wrap;
    word-break: break-word;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<header>
  <h1>Life in Months</h1>
  <span class="born-label">Born</span>
  <input type="text" id="birthdate-display" placeholder="dd/mm/yyyy" />
</header>

<div class="grid-section">
  <div class="grid-outer">
    <div class="month-axis" id="monthAxis1"></div>
    <div class="grid-inner">
      <div class="year-row" id="yearRow1"></div>
      <div id="monthRows1"></div>
    </div>
  </div>
  <div class="grid-outer">
    <div class="month-axis" id="monthAxis2"></div>
    <div class="grid-inner">
      <div class="year-row" id="yearRow2"></div>
      <div id="monthRows2"></div>
    </div>
  </div>
</div>

<div id="panel">
  <div class="panel-placeholder">Click any month to add a note</div>
</div>

<footer>
  <a class="back-link" href="../">< Home</a>
  <button id="btnReset">RESET</button>
  <button id="btnExport">EXPORT</button>
  <button id="btnImport">IMPORT</button>
  <input type="file" id="fileInput" accept=".json">
  <div class="legend">
    <div class="li"><div class="dot lived"></div>Lived</div>
    <div class="li"><div class="dot life"></div>Life</div>
    <div class="li"><div class="dot work"></div>Work</div>
    <div class="li"><div class="dot investment"></div>Investment</div>
    <div class="li"><div class="dot business"></div>Business</div>
    <div class="li"><div class="dot multi"></div>Multi</div>
    <div class="li"><div class="dot future"></div>Future</div>
  </div>
  <span class="version">v1.0.0</span>
</footer>

<div id="tooltip"></div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const STORAGE_KEY = 'life-months';

let state = { birthdate: '', cells: {} };

try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) state = JSON.parse(raw);
} catch (e) {
  Swal.fire({ icon: 'error', title: 'Corrupted data', text: 'Saved data could not be loaded. Starting fresh.' });
  localStorage.removeItem(STORAGE_KEY);
}

function updateDobHint() {
  const els = [document.querySelector('.born-label'), document.getElementById('birthdate-display')];
  els.forEach(el => el.classList.toggle('dob-hint', !state.birthdate));
}

let saveTimer;
let saveBlocked = false;
function scheduleSave() {
  if (saveBlocked) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        saveBlocked = true;
        Swal.fire({ icon: 'warning', title: 'Storage full', text: 'Export your data to continue saving.' });
      }
    }
  }, 300);
}

function buildMonthAxis(id) {
  const container = document.getElementById(id);
  MONTHS.forEach(m => {
    const el = document.createElement('div');
    el.className = 'month-label';
    el.textContent = m.slice(0, 3);
    container.appendChild(el);
  });
}
buildMonthAxis('monthAxis1');
buildMonthAxis('monthAxis2');
const monthLabelEls = [
  ...document.getElementById('monthAxis1').querySelectorAll('.month-label'),
  ...document.getElementById('monthAxis2').querySelectorAll('.month-label'),
];

function buildYearRow(id, count) {
  const container = document.getElementById(id);
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'year-label';
    container.appendChild(el);
  }
}
buildYearRow('yearRow1', 50);
buildYearRow('yearRow2', 50);

let selectedEl = null;
let selectedKey = null;

function setActiveMonthLabel(mo, yr) {
  monthLabelEls.forEach(el => el.classList.remove('active'));
  if (mo === null) return;
  monthLabelEls[yr < 50 ? mo : mo + 12].classList.add('active');
}
const cellEls = [];

const tooltip = document.getElementById('tooltip');
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function showTooltip(text) {
  tooltip.textContent = text;
  tooltip.style.display = 'block';
  positionTooltip();
}
function positionTooltip() {
  const pad = 12;
  let x = mouseX + pad, y = mouseY + pad;
  if (x + tooltip.offsetWidth > window.innerWidth - 8) x = mouseX - tooltip.offsetWidth - pad;
  if (y + tooltip.offsetHeight > window.innerHeight - 8) y = mouseY - tooltip.offsetHeight - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

for (let mo = 0; mo < 12; mo++) {
  const row1 = document.createElement('div');
  row1.className = 'month-row';
  const row2 = document.createElement('div');
  row2.className = 'month-row';

  for (let yr = 0; yr < 50; yr++) {
    const cell = document.createElement('div');
    cell.className = 'cell future';
    cell.dataset.yr = yr;
    cell.dataset.mo = mo;
    cell.addEventListener('click', () => onCellClick(cell, yr, mo));
    cell.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onCellClick(cell, yr, mo); } });
    cell.addEventListener('mouseenter', () => onCellHover(yr, mo));
    cell.addEventListener('mouseleave', hideTooltip);
    row1.appendChild(cell);
    cellEls.push(cell);
  }
  for (let yr = 50; yr < 100; yr++) {
    const cell = document.createElement('div');
    cell.className = 'cell future';
    cell.dataset.yr = yr;
    cell.dataset.mo = mo;
    cell.addEventListener('click', () => onCellClick(cell, yr, mo));
    cell.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onCellClick(cell, yr, mo); } });
    cell.addEventListener('mouseenter', () => onCellHover(yr, mo));
    cell.addEventListener('mouseleave', hideTooltip);
    row2.appendChild(cell);
    cellEls.push(cell);
  }

  document.getElementById('monthRows1').appendChild(row1);
  document.getElementById('monthRows2').appendChild(row2);
}

function onCellHover(yr, mo) {
  const bd = state.birthdate;
  if (!bd) return;
  const parts = bd.split('-');
  const birthMonth = parseInt(parts[1]) - 1;
  const key = yr * 12 + (mo - birthMonth);
  const c = state.cells[key];
  if (!c) return;
  if (c.notes) showTooltip(c.notes);
}

function renderGrid() {
  updateDobHint();
  const bd = state.birthdate;
  const now = new Date();

  if (!bd) {
    document.getElementById('yearRow1').querySelectorAll('.year-label').forEach(el => el.textContent = '');
    document.getElementById('yearRow2').querySelectorAll('.year-label').forEach(el => el.textContent = '');
    cellEls.forEach(cell => {
      cell.className = 'cell future';
      if (cell === selectedEl) cell.classList.add('selected');
    });
    return;
  }

  const parts = bd.split('-');
  const birthYear  = parseInt(parts[0]);
  const birthMonth = parseInt(parts[1]) - 1;
  const currentKey = (now.getFullYear() - birthYear) * 12 + (now.getMonth() - birthMonth);

  const yearLabels1 = document.getElementById('yearRow1').querySelectorAll('.year-label');
  yearLabels1.forEach((el, i) => {
    el.textContent = (i % 10 === 0 || i === 49) ? String(birthYear + i) : '';
  });

  const yearLabels2 = document.getElementById('yearRow2').querySelectorAll('.year-label');
  yearLabels2.forEach((el, i) => {
    const y = i + 50;
    el.textContent = (y % 10 === 0 || y === 99) ? String(birthYear + y) : '';
  });

  cellEls.forEach(cell => {
    const yr = parseInt(cell.dataset.yr);
    const mo = parseInt(cell.dataset.mo);
    const key = yr * 12 + (mo - birthMonth);

    let cls = 'cell';
    if (key < 0) {
      cls += ' pre-birth';
    } else if (key > 1199) {
      cls += ' future';
    } else if (key <= currentKey) {
      cls += ' lived';
    } else {
      cls += ' future';
    }

    const c = state.cells[key];
    if (c) {
      const cats = ['life', 'work', 'investment', 'business'].filter(k => c[k]);
      if      (cats.length > 1)  cls += ' cat-multi';
      else if (cats.length === 1) cls += ` cat-${cats[0]}`;
      else                        cls += ' has-note';
    }

    cell.className = cls;
    if (cell === selectedEl) cell.classList.add('selected');
  });
}

function onCellClick(cell, yr, mo) {
  const bd = state.birthdate;

  if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl.removeAttribute('tabindex'); }
  cell.setAttribute('tabindex', '0');
  cell.classList.add('selected');
  selectedEl = cell;
  setActiveMonthLabel(mo, yr);

  if (!bd) {
    document.getElementById('panel').innerHTML =
      '<div class="panel-placeholder">Enter your birth date above to annotate months.</div>';
    return;
  }

  const parts = bd.split('-');
  const birthYear  = parseInt(parts[0]);
  const birthMonth = parseInt(parts[1]) - 1;
  const key = yr * 12 + (mo - birthMonth);
  selectedKey = key;

  if (key < 0 || key > 1199) {
    document.getElementById('panel').innerHTML =
      '<div class="panel-placeholder">This was from your previous life...</div>';
    return;
  }

  const note = state.cells[key] ?? { notes: '', life: false, work: false, investment: false, business: false };
  const calYear   = birthYear + yr;
  const monthName = MONTHS[mo];
  let age = yr;
  if (mo < birthMonth) age -= 1;

  document.getElementById('panel').innerHTML = `
    <div class="panel-open">
      <div class="panel-meta">
        <div class="month-name">${monthName} ${calYear}</div>
        <div class="age">${age}</div>
        <div class="age-label">years old</div>
      </div>
      <div class="field-wrap">
        <textarea id="ta-notes" placeholder="Enter a note...">${escHtml(note.notes)}</textarea>
      </div>
      <div class="categories-wrap">
        <div class="field-label">Categories</div>
        <div class="category-check">
          <input type="checkbox" id="cat-life" ${note.life ? 'checked' : ''}>
          <label for="cat-life">Life</label>
        </div>
        <div class="category-check">
          <input type="checkbox" id="cat-work" ${note.work ? 'checked' : ''}>
          <label for="cat-work">Work</label>
        </div>
        <div class="category-check">
          <input type="checkbox" id="cat-investment" ${note.investment ? 'checked' : ''}>
          <label for="cat-investment">Investment</label>
        </div>
        <div class="category-check">
          <input type="checkbox" id="cat-business" ${note.business ? 'checked' : ''}>
          <label for="cat-business">Business</label>
        </div>
      </div>
    </div>`;

  document.getElementById('ta-notes').addEventListener('input', () => onNoteInput(key, cell));

  ['life', 'work', 'investment', 'business'].forEach(cat => {
    document.getElementById(`cat-${cat}`).addEventListener('change', () => onNoteInput(key, cell));
  });
}

function refreshCellClass(cell, c) {
  cell.classList.remove('cat-life', 'cat-work', 'cat-investment', 'cat-business', 'cat-multi', 'has-note');
  if (!c) return;
  const cats = ['life', 'work', 'investment', 'business'].filter(k => c[k]);
  if      (cats.length > 1)   cell.classList.add('cat-multi');
  else if (cats.length === 1) cell.classList.add(`cat-${cats[0]}`);
  else if (c.notes)           cell.classList.add('has-note');
}

function onNoteInput(key, cell) {
  const notes      = document.getElementById('ta-notes')?.value ?? '';
  const life       = document.getElementById('cat-life')?.checked ?? false;
  const work       = document.getElementById('cat-work')?.checked ?? false;
  const investment = document.getElementById('cat-investment')?.checked ?? false;
  const business   = document.getElementById('cat-business')?.checked ?? false;

  if (notes || life || work || investment || business) {
    state.cells[key] = { notes, life, work, investment, business };
  } else {
    delete state.cells[key];
  }
  refreshCellClass(cell, state.cells[key]);
  if (cell === selectedEl) cell.classList.add('selected');
  scheduleSave();
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function updateBirthdateDisplay(dateStr) {
  const parts = dateStr.split('-');
  const formatted = `${String(parseInt(parts[2])).padStart(2,'0')} ${MONTHS[parseInt(parts[1]) - 1]} ${parts[0]}`;
  document.getElementById('birthdate-display').value = formatted;
}

function clearBirthdateDisplay() {
  document.getElementById('birthdate-display').value = '';
}

function loadBirthdateUI() {
  if (state.birthdate) updateBirthdateDisplay(state.birthdate);
}

const displayInput = document.getElementById('birthdate-display');

function commitBirthdate() {
  const val = displayInput.value.trim();

  if (!val) {
    state.birthdate = '';
    renderGrid();
    scheduleSave();
    return;
  }

  if (/^\d{2} [A-Z][a-z]{2} \d{4}$/.test(val)) return;

  const match = val.match(/^(\d{1,2})[\/\-\. ](\d{1,2})[\/\-\. ](\d{4})$/) || val.match(/^(\d{2})(\d{2})(\d{4})$/);
  if (!match) {
    state.birthdate ? updateBirthdateDisplay(state.birthdate) : clearBirthdateDisplay();
    return;
  }

  const dd = parseInt(match[1]), mm = parseInt(match[2]), yyyy = parseInt(match[3]);
  const date = new Date(yyyy, mm - 1, dd);
  if (date.getFullYear() !== yyyy || date.getMonth() !== mm - 1 || date.getDate() !== dd) {
    state.birthdate ? updateBirthdateDisplay(state.birthdate) : clearBirthdateDisplay();
    return;
  }

  const iso = `${yyyy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  state.birthdate = iso;
  updateBirthdateDisplay(iso);
  renderGrid();
  scheduleSave();

  const curYr = new Date().getFullYear() - yyyy;
  const curMo = new Date().getMonth();
  const cell = cellEls.find(c => parseInt(c.dataset.yr) === curYr && parseInt(c.dataset.mo) === curMo);
  if (cell) { cell.click(); cell.focus(); cell.scrollIntoView({ block: 'nearest' }); }
}

displayInput.addEventListener('blur', commitBirthdate);
displayInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); commitBirthdate(); displayInput.blur(); }
});


document.addEventListener('keydown', e => {
  const inInput = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);

  if (e.key === 'Escape') {
    if (document.activeElement === document.getElementById('ta-notes')) {
      document.activeElement.blur();
      if (selectedEl) selectedEl.focus();
      return;
    }
    if (selectedEl) {
      selectedEl.classList.remove('selected');
      selectedEl.removeAttribute('tabindex');
      selectedEl = null;
      selectedKey = null;
      setActiveMonthLabel(null);
    }
    return;
  }

  if (e.key === 'Enter' && selectedEl && !inInput) {
    e.preventDefault();
    const ta = document.getElementById('ta-notes');
    if (ta) ta.focus();
    return;
  }

  if (!inInput) {
    if (e.key === 'r') { document.getElementById('btnReset').click(); return; }
    if (e.key === 'e') { document.getElementById('btnExport').click(); return; }
    if (e.key === 'i') { document.getElementById('btnImport').click(); return; }
  }

  if (!selectedEl || !['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) return;

  const currentYr = parseInt(selectedEl.dataset.yr);
  const currentMo = parseInt(selectedEl.dataset.mo);
  let newYr = currentYr;
  let newMo = currentMo;

  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); newMo--; if (newMo < 0)  { newMo = 11; newYr--; } break;
    case 'ArrowDown':  e.preventDefault(); newMo++; if (newMo > 11) { newMo = 0;  newYr++; } break;
    case 'ArrowLeft':  e.preventDefault(); newYr--; break;
    case 'ArrowRight': e.preventDefault(); newYr++; break;
  }

  if (newYr < 0 || newYr > 99) return;
  const newCell = cellEls.find(c => parseInt(c.dataset.yr) === newYr && parseInt(c.dataset.mo) === newMo);
  if (newCell) { newCell.click(); newCell.focus(); newCell.scrollIntoView({ block: 'nearest' }); }
});

document.getElementById('btnReset').addEventListener('click', async () => {
  const { isConfirmed } = await Swal.fire({
    title: 'Clear all data?',
    text: 'This cannot be undone.',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Clear',
    cancelButtonText: 'Cancel',
  });
  if (!isConfirmed) return;

  const { isConfirmed: wantsSave } = await Swal.fire({
    title: 'Save a backup first?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Save',
    cancelButtonText: 'Skip',
  });
  if (wantsSave) document.getElementById('btnExport').click();

  state = { birthdate: '', cells: {} };
  clearBirthdateDisplay();
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = null;
  selectedKey = null;
  document.getElementById('panel').innerHTML = '<div class="panel-placeholder">Click any month to add a note</div>';

  renderGrid();
  scheduleSave();
});

document.getElementById('btnExport').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const dob = state.birthdate ? state.birthdate.replace(/-/g, '') : 'unknown';
  a.download = `life_in_months_dob_${dob}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = async ev => {
    let parsed;
    try {
      parsed = JSON.parse(ev.target.result);
    } catch {
      Swal.fire({ icon: 'error', title: 'Invalid file', text: 'Could not read file — invalid JSON.' });
      return;
    }

    if (!parsed.cells && !parsed.birthdate) {
      Swal.fire({ icon: 'error', title: 'Wrong file', text: "This doesn't look like a life-months export file." });
      return;
    }

    const incoming = parsed.cells || {};
    const conflicts = Object.keys(incoming).filter(k => state.cells[k] !== undefined).length;

    if (conflicts > 0) {
      const { isConfirmed } = await Swal.fire({
        title: 'Overwrite existing months?',
        text: `Import will overwrite ${conflicts} existing month${conflicts === 1 ? '' : 's'}. Unaffected months are kept.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Import',
        cancelButtonText: 'Cancel',
      });
      if (!isConfirmed) return;
    }

    if (parsed.birthdate) state.birthdate = parsed.birthdate;
    Object.assign(state.cells, incoming);
    Object.keys(state.cells).forEach(k => {
      const c = state.cells[k];
      if (!c.notes && !c.life && !c.work && !c.investment && !c.business) delete state.cells[k];
    });

    if (selectedEl) {
      selectedEl.classList.remove('selected');
      selectedEl = null;
      selectedKey = null;
    }
    document.getElementById('panel').innerHTML = '<div class="panel-placeholder">Click any month to add a note</div>';

    loadBirthdateUI();
    renderGrid();
    scheduleSave();

    if (state.birthdate) {
      const p = state.birthdate.split('-');
      const curYr = new Date().getFullYear() - parseInt(p[0]);
      const curMo = new Date().getMonth();
      const cell = cellEls.find(c => parseInt(c.dataset.yr) === curYr && parseInt(c.dataset.mo) === curMo);
      if (cell) { cell.click(); cell.focus(); cell.scrollIntoView({ block: 'nearest' }); }
    }
  };
  reader.readAsText(file);
});

loadBirthdateUI();
renderGrid();

if (state.birthdate) {
  const parts = state.birthdate.split('-');
  const birthYear  = parseInt(parts[0]);
  const birthMonth = parseInt(parts[1]) - 1;
  const now = new Date();
  const curYr = now.getFullYear() - birthYear;
  const curMo = now.getMonth();
  const cell = cellEls.find(c => parseInt(c.dataset.yr) === curYr && parseInt(c.dataset.mo) === curMo);
  if (cell) { cell.click(); cell.focus(); cell.scrollIntoView({ block: 'nearest' }); }
}
</script>
</body>
</html>
