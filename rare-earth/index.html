<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rare Earth</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(17px, 1.3vw, 26px); }

  :root {
    --bg:           #f8f8f5;
    --bg-panel:     #edeae3;
    --bg-output:    #f3f1eb;
    --text:         #222;
    --text-2:       #666;
    --text-3:       #777;
    --border:       #d0d0cc;
    --border-ui:    #ccc;
    --border-hover: #888;
    --accent:       #4a7ab4;
    --text-2-inverse: #aaa;   /* muted text ON an inverted surface */
    --dot-red:      #b5352e;
  }

  body {
    font-family: 'Courier New', monospace;
    font-size: 0.93rem;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  header h1 {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  header p {
    font-size: 0.73rem;
    color: var(--text-3);
    letter-spacing: 0.06em;
  }

  /* ── Map ─────────────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 0;
    overflow: hidden;
  }
  #map-wrap {
    width: 100%;
    height: 100%;
    max-width: 1400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #map { width: 100%; height: auto; }
  #world-outline path {
    fill: none;
    stroke: var(--border-hover);
    stroke-width: 0.6;
    vector-effect: non-scaling-stroke;
  }
  .dot-hit {
    fill: transparent;
    cursor: pointer;
  }
  .dot-visible {
    fill: var(--dot-red);
    pointer-events: none;
  }
  /* Ring, not a box. `outline` on an SVG circle draws the bounding RECT, so
     an outline-based focus style renders a square around a round dot.
     Stroking .dot-hit itself (r=9) gives a ring concentric with the visible
     dot (r=2.6), and --dot-red keeps the focus mark tied to the thing it
     surrounds. This is the one place --accent is deliberately not used —
     see DESIGN.md "Focus on data marks"; .back-link below still follows it.

     :focus, NOT :focus-visible. Two reasons, both learned the hard way:
       1. A mouse click sets :focus but not :focus-visible, so a
          :focus-visible-only rule never runs on click — and the browser
          then paints its OWN ring (outline: auto 5px #005fcc), which is
          the blue square this replaces. Suppressing it needs outline:none
          on plain :focus.
       2. Clicking a dot opens Google Earth in a new tab; on return the
          ring marks which dot you came from, which is worth keeping.
     Test this with a real click, not el.focus() — programmatic focus DOES
     match :focus-visible and hides the bug. */
  .dot-hit:focus {
    outline: none;
    stroke: var(--dot-red);
    stroke-width: 2;
    vector-effect: non-scaling-stroke;
  }

  /* Screen-reader-only description text — visually hidden, not display:none,
     so it stays in the accessibility tree without rendering. Deliberately
     NOT an SVG <title>: that element triggers the browser's own native
     tooltip on hover, duplicating the custom .tooltip-box below. */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* ── Tooltip ─────────────────────────────────────────────────── */
  .tooltip-box {
    position: fixed;
    background: var(--text);
    color: var(--bg);
    font-family: 'Courier New', monospace;
    font-size: 0.63rem;
    line-height: 1.5;
    padding: 6px 10px;
    pointer-events: none;
    z-index: 100;
    letter-spacing: 0.02em;
    display: none;
    max-width: 220px;
    white-space: normal;
  }
  .tooltip-box .tt-label { font-weight: bold; letter-spacing: 0.04em; }
  .tooltip-box .tt-coords { color: var(--text-2-inverse); font-size: 0.58rem; margin: 2px 0 4px; }
  .tooltip-box .tt-added { color: var(--text-2-inverse); font-size: 0.58rem; letter-spacing: 0.04em; margin-top: 6px; }

  footer {
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.73rem;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-link {
    font-size: 0.73rem;
    color: var(--text-3);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .back-link:hover { color: var(--text); }
  .back-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .version { font-size: 0.67rem; color: var(--text-3); letter-spacing: 0.06em; margin-left: auto; }

  @media (max-width: 600px) {
    header { padding: 12px 16px 10px; }
    footer { padding: 8px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Rare Earth</h1>
    <p>Curious coordinates on Google Earth</p>
  </div>
</header>

/* ────────────────────────────────────────────────────────────────
   Pure math — projection, validation.
   Tested standalone in math.test.js via a document-less vm sandbox.
   ──────────────────────────────────────────────────────────────── */

const VIEWBOX_WIDTH = 1000;
const VIEWBOX_HEIGHT = 506.2;

function projectPoint(lat, lon, w = VIEWBOX_WIDTH, h = VIEWBOX_HEIGHT) {
  return {
    x: (lon + 180) / 360 * w,
    y: (90 - lat) / 180 * h,
  };
}

function validateLocations(locations) {
  const errors = [];
  locations.forEach((loc, i) => {
    if (typeof loc.lat !== 'number' || loc.lat < -90 || loc.lat > 90) {
      errors.push(`[${i}] ${loc.name || '(unnamed)'}: lat out of range: ${loc.lat}`);
    }
    if (typeof loc.lon !== 'number' || loc.lon < -180 || loc.lon > 180) {
      errors.push(`[${i}] ${loc.name || '(unnamed)'}: lon out of range: ${loc.lon}`);
    }
    if (!loc.name) errors.push(`[${i}] missing name`);
    if (!loc.blurb) errors.push(`[${i}] ${loc.name || '(unnamed)'}: missing blurb`);
    if (!loc.earthUrl) errors.push(`[${i}] ${loc.name || '(unnamed)'}: missing earthUrl`);
    // `added` is the date the dot was placed (YYYY-MM-DD) — shown in the tooltip
    // and how new (cloud-agent) dots are told apart from the originals.
    if (!/^\d{4}-\d{2}-\d{2}$/.test(loc.added || '')) {
      errors.push(`[${i}] ${loc.name || '(unnamed)'}: missing or malformed added date (want YYYY-MM-DD): ${loc.added}`);
    }
  });
  return errors;
}

const RareEarthMath = { VIEWBOX_WIDTH, VIEWBOX_HEIGHT, projectPoint, validateLocations };
(typeof window !== 'undefined' ? window : globalThis).RareEarthMath = RareEarthMath;

/* ────────────────────────────────────────────────────────────────
   Location data — hand-curated, ~15-30 spots spanning natural
   wonders, man-made oddities, and mysterious patterns.

   the coordinate must land ON the subject, not merely in the right
   neighborhood. That check is the whole job — a coordinate 500m out
   still resolves to a plausible-looking place, so "it opens somewhere
   in Sydney" is not evidence of anything. Two entries failed it:
   Homebush pointed at an apartment block on dry land 500m from the
   wreck, and Boat in the City at a tower 55m off the ship.

   When adding a location, frame the WHOLE subject before judging the
   coordinate. Antibody was briefly "corrected" 110m south on the
   strength of a too-tight zoom that showed only the BODY letters and
   read them as the whole thing; the original coordinate was already
   centred on the full word. Zoom out until you can see where the
   subject ends, then confirm it sits under the crosshair.

   Dots are plotted straight from projectPoint(lat, lon) — no per-dot
   position fudging. The basemap is generated with that same projection
   (see the world-outline note), so a dot and the coastline it belongs to
   are guaranteed to agree. If a new dot looks off, the coordinate is
   wrong, not its placement.
   ──────────────────────────────────────────────────────────────── */

const LOCATIONS = [
  { name: 'Desert Carrier Target', lat: 38.5975, lon: 87.7415, blurb: 'A full-scale mock-up of a US aircraft carrier in the Taklamakan Desert, used for anti-ship missile targeting practice.',
    earthUrl: 'https://earth.google.com/web/@38.5975,87.7415,1200a,1000d,35y,0h,0t,0r', added: '2026-07-15' },
  { name: 'The Boneyard', lat: 32.1709, lon: -110.8552, blurb: 'The world\'s largest aircraft storage facility — over 4,000 retired military planes parked in the Arizona desert.',
    earthUrl: 'https://earth.google.com/web/@32.1709,-110.8552,780a,3000d,35y,0h,0t,0r', added: '2026-07-15' },
  { name: 'Nouadhibou Boat Overload', lat: 20.9125, lon: -17.0394, blurb: 'A working fishing port in Mauritania packed with far more boats than the harbor seems built for.',
    earthUrl: 'https://earth.google.com/web/@20.9125,-17.0394,5a,3000d,35y,0h,0t,0r', added: '2026-07-16' },
  // 90h (east-up) is deliberate — the buildings spell ANTIBODY along a

  // Heading 90 turns it upright and readable. Don't normalise this to 0h.
  { name: 'Antibody Building', lat: 31.6634, lon: 117.9053, blurb: 'A biotech campus in Hefei, China, where the buildings themselves are laid out to spell the company\'s name — ANTIBODY, legible from orbit.',
    earthUrl: 'https://earth.google.com/web/@31.6634,117.9053,50a,1200d,35y,90h,0t,0r', added: '2026-07-16' },
  { name: 'Boat in the City', lat: 22.3041, lon: 114.1899, blurb: 'A full-size concrete ship marooned among the apartment towers of Hong Kong — the Whampoa, a shopping mall built in the shape of an ocean liner.',
    earthUrl: 'https://earth.google.com/web/@22.3041,114.1899,10a,1200d,35y,0h,0t,0r', added: '2026-07-16' },
  { name: 'Badlands Guardian', lat: 50.0106, lon: -110.1134, blurb: 'An eroded hill in Alberta, Canada that from above resembles a human head wearing a full Indigenous headdress, complete with what looks like an earbud.',
    earthUrl: 'https://earth.google.com/web/@50.0106,-110.1134,730a,3000d,35y,0h,0t,0r', added: '2026-07-16' },
  { name: 'Homebush Shipwreck', lat: -33.8332, lon: 151.0767, blurb: 'The SS Ayrfield, a rusted steel hull abandoned in Homebush Bay, Sydney — now a "floating forest" with mangroves growing out of its deck.',
    earthUrl: 'https://earth.google.com/web/@-33.8332,151.0767,5a,500d,35y,0h,0t,0r', added: '2026-07-16' },
  // Centred BETWEEN the two pandas so both fit the frame at 2000d. GEM lists
  // 39.9711,113.4840 but flags it "approximate" — it lands ~490m south, off

  { name: 'Panda Solar Farm', lat: 39.9754, lon: 113.4855, blurb: 'A 50-megawatt solar plant near Datong, Shanxi, with its arrays laid out as two giant pandas — black monocrystalline panels for the dark patches, pale thin-film for the rest.',

  { name: 'Palmanova', lat: 45.9054, lon: 13.3099, blurb: 'A fortress town in northeast Italy, built by the Venetian Republic in 1593 as a perfect nine-pointed star — three concentric rings of ramparts with streets radiating from a central hexagonal piazza.',

  { name: 'Uffington White Horse', lat: 51.5779, lon: -1.5668, blurb: 'A prehistoric chalk figure cut into an English hillside — a wildly stylised horse of flowing, disconnected lines, about 110m long. Britain\'s oldest hill figure at roughly 3,000 years, kept visible by locals re-chalking it across millennia.',

  { name: 'Guitar Forest', lat: -33.86747, lon: -63.98694, blurb: 'A guitar over a kilometre long formed from thousands of cypress and eucalyptus trees, planted by an Argentine farmer as a memorial to his late wife. He is afraid of flying and has only ever seen it in photographs.',
    earthUrl: 'https://earth.google.com/web/@-33.86747,-63.98694,200a,2500d,35y,0h,0t,0r', added: '2026-07-18' },
  { name: 'El Ojo', lat: -34.25217, lon: -58.82983, blurb: 'A near-perfectly circular island, about 118m across, floating inside a matching ring of water in the Paraná Delta. It slowly rotates on its own axis, and the shearing keeps both island and channel round.',
    earthUrl: 'https://earth.google.com/web/@-34.25217,-58.82983,12a,600d,35y,0h,0t,0r', added: '2026-07-18' },
  { name: 'Alien Face', lat: -72.0100, lon: 168.5778, blurb: 'Dark rock outcrops against Antarctic snow form a face-like pattern, visible only from orbit.',

];

/* ────────────────────────────────────────────────────────────────
   DOM wiring — only runs in a real browser.
   ──────────────────────────────────────────────────────────────── */

if (typeof document !== 'undefined' && document.getElementById('map')) {

const errs = RareEarthMath.validateLocations(LOCATIONS);
if (errs.length) {
  console.error('LOCATIONS validation failed:', errs);
}

const svg = document.getElementById('map');
const svgNS = 'http://www.w3.org/2000/svg';
const tooltip = document.getElementById('tooltip');
const ttLabel = document.getElementById('tt-label');
const ttCoords = document.getElementById('tt-coords');
const ttBlurb = document.getElementById('tt-blurb');
const ttAdded = document.getElementById('tt-added');

// Holds one visually-hidden span per dot (screen-reader description text,
// referenced via aria-describedby). Plain HTML on purpose — see the
// .sr-only comment above for why this isn't an SVG <title>.
const descContainer = document.createElement('div');
descContainer.className = 'sr-only';
document.body.appendChild(descContainer);

let tapArmed = null; // location currently in "first tap shown, awaiting second tap" state (touch only)

function formatCoords(lat, lon) {
  const latDir = lat >= 0 ? 'N' : 'S';
  const lonDir = lon >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(4)}°${latDir}, ${Math.abs(lon).toFixed(4)}°${lonDir}`;
}

function showTooltip(loc, x, y) {
  ttLabel.textContent = loc.name;
  ttCoords.textContent = formatCoords(loc.lat, loc.lon);
  ttBlurb.textContent = loc.blurb;
  ttAdded.textContent = loc.added ? `Added on ${loc.added}` : '';
  tooltip.style.display = 'block';
  positionTooltip(x, y);
}

function positionTooltip(x, y) {
  const pad = 12;
  const rect = tooltip.getBoundingClientRect();
  let left = x + pad;
  let top = y + pad;
  if (left + rect.width > window.innerWidth) left = x - rect.width - pad;
  if (top + rect.height > window.innerHeight) top = y - rect.height - pad;
  tooltip.style.left = `${Math.max(4, left)}px`;
  tooltip.style.top = `${Math.max(4, top)}px`;
}

function hideTooltip() {
  tooltip.style.display = 'none';
  tapArmed = null;
}

function navigateTo(loc) {
  window.open(loc.earthUrl, '_blank', 'noopener,noreferrer');
}

// ── Build dots ──────────────────────────────────────────────────

LOCATIONS.forEach((loc, i) => {
  // Plotted straight from the coordinate. The basemap shares this exact
  // projection (see the world-outline note), so dots and coastlines line up
  // by construction — there is no per-dot position override.
  const { x, y } = RareEarthMath.projectPoint(loc.lat, loc.lon);

  const group = document.createElementNS(svgNS, 'g');

  const hit = document.createElementNS(svgNS, 'circle');
  hit.setAttribute('class', 'dot-hit');
  hit.setAttribute('cx', x);
  hit.setAttribute('cy', y);
  hit.setAttribute('r', 9); // enlarged invisible hit-area under the small visible dot
  hit.setAttribute('tabindex', '0');
  hit.setAttribute('role', 'link');
  hit.setAttribute('aria-label', loc.name);
  hit.setAttribute('aria-describedby', `loc-desc-${i}`);

  const visible = document.createElementNS(svgNS, 'circle');
  visible.setAttribute('class', 'dot-visible');
  visible.setAttribute('cx', x);
  visible.setAttribute('cy', y);
  visible.setAttribute('r', 2.6); // Safari: set via attribute, not CSS `r`

  // Plain HTML span, not an SVG <title> — <title> triggers the browser's
  // own native tooltip on hover, which duplicated the custom .tooltip-box.
  const desc = document.createElement('span');
  desc.className = 'sr-only';
  desc.id = `loc-desc-${i}`;
  desc.textContent = loc.added ? `${loc.blurb} Added on ${loc.added}.` : loc.blurb;
  descContainer.appendChild(desc);

  group.appendChild(visible);
  group.appendChild(hit);
  svg.appendChild(group);

  // Hover (mouse)
  hit.addEventListener('mouseenter', (e) => showTooltip(loc, e.clientX, e.clientY));
  hit.addEventListener('mousemove', (e) => positionTooltip(e.clientX, e.clientY));
  hit.addEventListener('mouseleave', hideTooltip);

  // Keyboard focus — same tooltip a mouse-hover shows, not just a focus ring
  hit.addEventListener('focus', () => {
    const rect = hit.getBoundingClientRect();
    showTooltip(loc, rect.left, rect.top);
  });
  hit.addEventListener('blur', hideTooltip);
  hit.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      navigateTo(loc);
    } else if (e.key === 'Escape') {
      hideTooltip();
      hit.blur();
    }
  });

  // Click (mouse) — direct navigate
  hit.addEventListener('click', (e) => {
    if (e.pointerType === 'touch') return; // touch handled by touchend below
    navigateTo(loc);
  });

  // Touch — first tap previews, second tap navigates
  hit.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (tapArmed === loc) {
      navigateTo(loc);
      hideTooltip();
    } else {
      tapArmed = loc;
      const touch = e.changedTouches[0];
      showTooltip(loc, touch.clientX, touch.clientY);
    }
  });
});

// Tap elsewhere / a different dot clears the open tooltip (touch dismiss).
document.addEventListener('touchend', (e) => {
  if (!e.target.closest('.dot-hit')) hideTooltip();
});

// Escape dismisses regardless of input mode (mouse-hover has no focused
// element to blur, so handle it globally too).
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideTooltip();
});

}
</script>

</body>
</html>
