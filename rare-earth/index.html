<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rare Earth</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(17px, 1.3vw, 26px); }

  :root {
    --bg:           #f8f8f5;
    --bg-panel:     #edeae3;
    --bg-output:    #f3f1eb;
    --text:         #222;
    --text-2:       #666;
    --text-3:       #777;
    --border:       #d0d0cc;
    --border-ui:    #ccc;
    --border-hover: #888;
    --accent:       #4a7ab4;
    --dot-red:      #b5352e;
  }

  body {
    font-family: 'Courier New', monospace;
    font-size: 0.93rem;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  header h1 {
    font-size: 1rem;
    font-weight: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  header p {
    font-size: 0.73rem;
    color: var(--text-3);
    letter-spacing: 0.06em;
  }

  /* ── Map ─────────────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 0;
    overflow: hidden;
  }
  #map-wrap {
    width: 100%;
    height: 100%;
    max-width: 1400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #map { width: 100%; height: auto; }
  #world-outline path {
    fill: none;
    stroke: var(--border-hover);
    stroke-width: 0.6;
    vector-effect: non-scaling-stroke;
  }
  .dot-hit {
    fill: transparent;
    cursor: pointer;
  }
  .dot-visible {
    fill: var(--dot-red);
    pointer-events: none;
  }
  .dot-hit:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* Screen-reader-only description text — visually hidden, not display:none,
     so it stays in the accessibility tree without rendering. Deliberately
     NOT an SVG <title>: that element triggers the browser's own native
     tooltip on hover, duplicating the custom .tooltip-box below. */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* ── Tooltip ─────────────────────────────────────────────────── */
  .tooltip-box {
    position: fixed;
    background: var(--text);
    color: var(--bg);
    font-family: 'Courier New', monospace;
    font-size: 0.63rem;
    line-height: 1.5;
    padding: 6px 10px;
    pointer-events: none;
    z-index: 100;
    letter-spacing: 0.02em;
    display: none;
    max-width: 220px;
    white-space: normal;
  }
  .tooltip-box .tt-label { font-weight: bold; letter-spacing: 0.04em; }
  .tooltip-box .tt-coords { color: #aaa; font-size: 0.58rem; margin: 2px 0 4px; }

  footer {
    padding: 10px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.73rem;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-link {
    font-size: 0.73rem;
    color: var(--text-3);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .back-link:hover { color: var(--text); }
  .back-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .version { font-size: 0.67rem; color: var(--text-3); letter-spacing: 0.06em; margin-left: auto; }

  @media (max-width: 600px) {
    header { padding: 12px 16px 10px; }
    footer { padding: 8px 16px; }
  }
</style>
</head>

<script>
/* ────────────────────────────────────────────────────────────────
   Pure math — projection, validation.
   Tested standalone in math.test.js via a document-less vm sandbox.
   ──────────────────────────────────────────────────────────────── */

const VIEWBOX_WIDTH = 1000;
const VIEWBOX_HEIGHT = 506.2;

function projectPoint(lat, lon, w = VIEWBOX_WIDTH, h = VIEWBOX_HEIGHT) {
  return {
    x: (lon + 180) / 360 * w,
    y: (90 - lat) / 180 * h,
  };
}

function validateLocations(locations) {
  const errors = [];
  locations.forEach((loc, i) => {
    if (typeof loc.lat !== 'number' || loc.lat < -90 || loc.lat > 90) {
      errors.push(`[${i}] ${loc.name || '(unnamed)'}: lat out of range: ${loc.lat}`);
    }
    if (typeof loc.lon !== 'number' || loc.lon < -180 || loc.lon > 180) {
      errors.push(`[${i}] ${loc.name || '(unnamed)'}: lon out of range: ${loc.lon}`);
    }
    if (!loc.name) errors.push(`[${i}] missing name`);
    if (!loc.blurb) errors.push(`[${i}] ${loc.name || '(unnamed)'}: missing blurb`);
    if (!loc.earthUrl) errors.push(`[${i}] ${loc.name || '(unnamed)'}: missing earthUrl`);
  });
  return errors;
}

const RareEarthMath = { VIEWBOX_WIDTH, VIEWBOX_HEIGHT, projectPoint, validateLocations };
(typeof window !== 'undefined' ? window : globalThis).RareEarthMath = RareEarthMath;

/* ────────────────────────────────────────────────────────────────
   Location data — hand-curated, ~15-30 spots spanning natural
   wonders, man-made oddities, and mysterious patterns. Every
   earthUrl below was verified by loading it in a real browser
   before shipping (see design doc Next Steps #3).
   ──────────────────────────────────────────────────────────────── */

const LOCATIONS = [
  // Natural geological wonders
  { name: 'Richat Structure', lat: 21.1233, lon: -11.3986, blurb: 'A 50km bullseye in the Sahara. Once blamed on Atlantis; actually a slowly eroding dome of rock.',

  { name: 'Grand Prismatic Spring', lat: 44.5251, lon: -110.8380, blurb: 'Yellowstone\'s rainbow hot spring. The colors are heat-loving bacteria, not the water itself.',

  { name: 'Racetrack Playa', lat: 36.6716, lon: -117.5619, blurb: 'Death Valley stones that "sail" across dry mud on their own, dragging visible trails.',
    earthUrl: 'https://earth.google.com/web/@36.6716,-117.5619,1130a,5000d,35y,0h,0t,0r' },

  // Man-made oddities
  { name: 'Great Pyramid of Giza', lat: 29.9792, lon: 31.1342, blurb: 'The last standing Wonder of the Ancient World. Aligned to true north within 0.05 degrees.',
    earthUrl: 'https://earth.google.com/web/@29.9792,31.1342,60a,2000d,35y,0h,0t,0r' },
  { name: 'Door to Hell', lat: 40.2526, lon: 58.4392, blurb: 'A Soviet drilling accident has been burning in the Karakum Desert since 1971.',
    earthUrl: 'https://earth.google.com/web/@40.2526,58.4392,270a,1500d,35y,0h,0t,0r' },
  { name: 'Palm Jumeirah', lat: 25.1124, lon: 55.1390, blurb: 'An artificial palm-tree-shaped island in Dubai, visible from orbit.',
    earthUrl: 'https://earth.google.com/web/@25.1124,55.1390,5a,15000d,35y,0h,0t,0r',
    pixelNudge: { x: 653.13, y: 182.78 } },
  { name: 'The Pentagon', lat: 38.8719, lon: -77.0563, blurb: 'The world\'s largest low-rise office building, shaped like a five-sided ring.',
    earthUrl: 'https://earth.google.com/web/@38.8719,-77.0563,20a,2000d,35y,0h,0t,0r',

  { name: 'Ivanpah Solar', lat: 35.5497, lon: -115.4692, blurb: 'Three concentric rings of 173,500 mirrors, each aimed at a central tower.',

  { name: 'Spiral Jetty', lat: 41.4376, lon: -112.6700, blurb: 'A 1,500-foot basalt spiral built into the Great Salt Lake as a work of land art.',

  // Mysterious patterns
  { name: 'Nazca Lines', lat: -14.7390, lon: -75.1300, blurb: 'Giant Peruvian geoglyphs only fully readable from the air. Purpose still debated.',
    earthUrl: 'https://earth.google.com/web/@-14.7390,-75.1300,520a,3000d,35y,0h,0t,0r' },
  { name: 'Chocolate Hills', lat: 9.8272, lon: 124.1447, blurb: 'Over 1,200 near-identical conical hills in the Philippines. Nobody fully agrees why.',
    earthUrl: 'https://earth.google.com/web/@9.8272,124.1447,150a,10000d,35y,0h,0t,0r',
    pixelNudge: { x: 816.50, y: 217.71 } },
  { name: 'Namib Fairy Circles', lat: -24.7136, lon: 15.9611, blurb: 'Bare circular patches scattered across the desert grass, unexplained for decades.',
    earthUrl: 'https://earth.google.com/web/@-24.7136,15.9611,1100a,15000d,35y,0h,0t,0r' },
  { name: 'Blood Falls', lat: -77.7167, lon: 162.2667, blurb: 'Antarctic glacier water stained deep red by ancient trapped iron-rich brine.',
    earthUrl: 'https://earth.google.com/web/@-77.7167,162.2667,50a,5000d,35y,0h,0t,0r',
    pixelNudge: { x: 936.63, y: 474.10 } },
  { name: 'Avebury', lat: 51.4275, lon: -1.8536, blurb: 'Ancient stone circle in an English county where new crop circles keep appearing.',
    earthUrl: 'https://earth.google.com/web/@51.4275,-1.8536,150a,30000d,35y,0h,0t,0r' },
  { name: 'Crooked Forest', lat: 53.2356, lon: 14.4522, blurb: 'A grove of 400 pine trees, all bent 90 degrees at the base in the same direction.',
    earthUrl: 'https://earth.google.com/web/@53.2356,14.4522,30a,500d,35y,0h,0t,0r' },
  { name: 'Alien Face', lat: -72.0100, lon: 168.5778, blurb: 'Dark rock outcrops against Antarctic snow form a face-like pattern, visible only from orbit.',
    earthUrl: 'https://earth.google.com/web/@-72.0100,168.5778,1500a,3000d,35y,0h,0t,0r',
    pixelNudge: { x: 944.48, y: 453.49 } },
];

/* ────────────────────────────────────────────────────────────────
   DOM wiring — only runs in a real browser.
   ──────────────────────────────────────────────────────────────── */

if (typeof document !== 'undefined' && document.getElementById('map')) {

const errs = RareEarthMath.validateLocations(LOCATIONS);
if (errs.length) {
  console.error('LOCATIONS validation failed:', errs);
}

const svg = document.getElementById('map');
const svgNS = 'http://www.w3.org/2000/svg';
const tooltip = document.getElementById('tooltip');
const ttLabel = document.getElementById('tt-label');
const ttCoords = document.getElementById('tt-coords');
const ttBlurb = document.getElementById('tt-blurb');

// Holds one visually-hidden span per dot (screen-reader description text,
// referenced via aria-describedby). Plain HTML on purpose — see the
// .sr-only comment above for why this isn't an SVG <title>.
const descContainer = document.createElement('div');
descContainer.className = 'sr-only';
document.body.appendChild(descContainer);

let tapArmed = null; // location currently in "first tap shown, awaiting second tap" state (touch only)

function formatCoords(lat, lon) {
  const latDir = lat >= 0 ? 'N' : 'S';
  const lonDir = lon >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(4)}°${latDir}, ${Math.abs(lon).toFixed(4)}°${lonDir}`;
}

function showTooltip(loc, x, y) {
  ttLabel.textContent = loc.name;
  ttCoords.textContent = formatCoords(loc.lat, loc.lon);
  ttBlurb.textContent = loc.blurb;
  tooltip.style.display = 'block';
  positionTooltip(x, y);
}

function positionTooltip(x, y) {
  const pad = 12;
  const rect = tooltip.getBoundingClientRect();
  let left = x + pad;
  let top = y + pad;
  if (left + rect.width > window.innerWidth) left = x - rect.width - pad;
  if (top + rect.height > window.innerHeight) top = y - rect.height - pad;
  tooltip.style.left = `${Math.max(4, left)}px`;
  tooltip.style.top = `${Math.max(4, top)}px`;
}

function hideTooltip() {
  tooltip.style.display = 'none';
  tapArmed = null;
}

function navigateTo(loc) {
  window.open(loc.earthUrl, '_blank', 'noopener,noreferrer');
}

// ── Build dots ──────────────────────────────────────────────────

LOCATIONS.forEach((loc, i) => {
  // pixelNudge overrides the plotted dot position for the handful of
  // locations where the simplified basemap's coastline resolution can't
  // support pinpoint accuracy (tiny islands, artificial land newer than
  // the source map, complex bays/ice shelves): Giant's Causeway, Palm
  // Jumeirah, The Pentagon, Chocolate Hills, Blood Falls, Alien Face.
  // Verified via point-in-polygon against the actual outline shapes (even
  // at near-zero simplification the raw source data still misses these —
  // a basemap-resolution limit, not a projection bug), then nudged each
  // to the nearest point on the outline. loc.lat/loc.lon (used in the
  // tooltip and the Google Earth link) are never touched — only the dot's
  // on-screen position is nudged.
  const { x, y } = loc.pixelNudge || RareEarthMath.projectPoint(loc.lat, loc.lon);

  const group = document.createElementNS(svgNS, 'g');

  const hit = document.createElementNS(svgNS, 'circle');
  hit.setAttribute('class', 'dot-hit');
  hit.setAttribute('cx', x);
  hit.setAttribute('cy', y);
  hit.setAttribute('r', 9); // enlarged invisible hit-area under the small visible dot
  hit.setAttribute('tabindex', '0');
  hit.setAttribute('role', 'link');
  hit.setAttribute('aria-label', loc.name);
  hit.setAttribute('aria-describedby', `loc-desc-${i}`);

  const visible = document.createElementNS(svgNS, 'circle');
  visible.setAttribute('class', 'dot-visible');
  visible.setAttribute('cx', x);
  visible.setAttribute('cy', y);
  visible.setAttribute('r', 2.6); // Safari: set via attribute, not CSS `r`

  // Plain HTML span, not an SVG <title> — <title> triggers the browser's
  // own native tooltip on hover, which duplicated the custom .tooltip-box.
  const desc = document.createElement('span');
  desc.className = 'sr-only';
  desc.id = `loc-desc-${i}`;
  desc.textContent = loc.blurb;
  descContainer.appendChild(desc);

  group.appendChild(visible);
  group.appendChild(hit);
  svg.appendChild(group);

  // Hover (mouse)
  hit.addEventListener('mouseenter', (e) => showTooltip(loc, e.clientX, e.clientY));
  hit.addEventListener('mousemove', (e) => positionTooltip(e.clientX, e.clientY));
  hit.addEventListener('mouseleave', hideTooltip);

  // Keyboard focus — same tooltip a mouse-hover shows, not just a focus ring
  hit.addEventListener('focus', () => {
    const rect = hit.getBoundingClientRect();
    showTooltip(loc, rect.left, rect.top);
  });
  hit.addEventListener('blur', hideTooltip);
  hit.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      navigateTo(loc);
    } else if (e.key === 'Escape') {
      hideTooltip();
      hit.blur();
    }
  });

  // Click (mouse) — direct navigate
  hit.addEventListener('click', (e) => {
    if (e.pointerType === 'touch') return; // touch handled by touchend below
    navigateTo(loc);
  });

  // Touch — first tap previews, second tap navigates
  hit.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (tapArmed === loc) {
      navigateTo(loc);
      hideTooltip();
    } else {
      tapArmed = loc;
      const touch = e.changedTouches[0];
      showTooltip(loc, touch.clientX, touch.clientY);
    }
  });
});

// Tap elsewhere / a different dot clears the open tooltip (touch dismiss).
document.addEventListener('touchend', (e) => {
  if (!e.target.closest('.dot-hit')) hideTooltip();
});

// Escape dismisses regardless of input mode (mouse-hover has no focused
// element to blur, so handle it globally too).
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideTooltip();
});

}
</script>

</body>
</html>
